    {name:"Russia",capital:"Moscow",style:"RUSSIAN"},{name:"Kazakhstan",capital:"Astana",style:"RUSSIAN"},
    {name:"Brazil",capital:"Brasília",style:"MODERN"},{name:"Nigeria",capital:"Abuja",style:"MODERN"},
    {name:"Germany",capital:"Berlin",style:"EUROPEAN"},{name:"France",capital:"Paris",style:"EUROPEAN"},
    {name:"Italy",capital:"Rome",style:"EUROPEAN"}
  ];
  var currentActiveCity=null;
  function updateCities(){
    if(!cityWorld) return;
    if(!SHOW_GROUND_PLANET){ cityBadgeEl.style.display="none"; return; }
    cityWorld.position.y=offSet;
    if(currentStage===5){ cityBadgeEl.style.display="none"; return; }
    var topCity=null,minDiff=999;
    for(var i=0;i<cities.length;i++){
      var city=cities[i];
      var ga=(city.angle+cityWorld.rotation.z)%(Math.PI*2);
      if(ga<0) ga+=Math.PI*2;
      var diff=Math.abs(ga-Math.PI/2);
      if(diff<minDiff){ minDiff=diff; topCity=city; }
    }
    if(topCity&&topCity!==currentActiveCity&&minDiff<0.2){
      currentActiveCity=topCity;
      var matching=cityCountries.filter(function(c){ return c.style===topCity.style; });
      if(matching.length>0){
        var c=matching[Math.floor(Math.random()*matching.length)];
        cityNameEl.textContent=c.capital+", "+c.name;
        cityBadgeEl.style.display="inline-block";
      }
    }
  }

  // ═══════════════════════════════════════════
  // BOSSES
  // ═══════════════════════════════════════════
  function spawnBoss(stage){
    if(!ENABLE_BOSSES) return;
    if(bossEnemy||bossSpawnedStages[stage]||stage===0) return;
    bossSpawnedStages[stage]=true;
    bossEnemy=new BossEnemy(stage);
    scene.add(bossEnemy.mesh);
    soundManager.playObstacle();
    spawnScorePopup(t("boss"),0,210,"boost");
  }
  function damageBoss(amount){
    if(!bossEnemy) return;
    bossEnemy.health-=amount;
    bossEnemy.mesh.scale.setScalar(1.2+0.1*Math.random());
    if(bossEnemy.health<=0){
      var reward=35+bossEnemy.stage*12;
      runCoins+=reward; score+=reward*scoreMultiplier;
      stats.bossesDefeated=(stats.bossesDefeated||0)+1;
      unlockAchievement("bossKill");
      spawnScorePopup(t("bossKillName")+" ★"+reward,bossEnemy.mesh.position.x,bossEnemy.mesh.position.y,"combo");
      scene.remove(bossEnemy.mesh); bossEnemy=null; soundManager.playAchievement();
    }
  }
  function updateBoss(dt){
    if(!bossEnemy) return;
    var b=bossEnemy, p=airplane.mesh.position, speed=getGameSpeed();
    b.mesh.position.z+=speed*7;
    if(b.mesh.position.z>-220) b.mesh.position.z=-1200;
    b.mesh.position.x=70*Math.sin(gameClock*1.5+b.stage)+20*Math.sin(gameClock*3.1);
    b.mesh.position.y=155+45*Math.cos(gameClock*1.1+b.stage);
    b.mesh.rotation.x+=0.015; b.mesh.rotation.y+=0.03; b.mesh.rotation.z+=0.01;
    var dx=p.x-b.mesh.position.x, dy=p.y-b.mesh.position.y, dz=p.z-b.mesh.position.z;
    if(dx*dx+dy*dy+dz*dz<58*58&&hitTimer<=0){
      if(activeEffects.starPower>0){ damageBoss(35); hitTimer=0.25; }
      else if(activeEffects.shield>0){ activeEffects.shield=0; damageBoss(15); hitTimer=0.7; }
      else if(!settings.immortalMode){ lives--; hitTimer=0.8; comboCount=0; comboTimer=0; soundManager.playObstacle(); if(lives<=0) showReviveScreen(); }
    }
    if(activeEffects.starPower>0) damageBoss(dt*12);
  }

  // ═══════════════════════════════════════════
  // STAGE PROGRESSION
  // ═══════════════════════════════════════════
  function updateStageProgression(){
    var newStage=0;
    if(score>=STAGE_THRESHOLDS.space) newStage=5;
    else if(score>=STAGE_THRESHOLDS.aurora) newStage=4;
    else if(score>=STAGE_THRESHOLDS.storm) newStage=3;
    else if(score>=STAGE_THRESHOLDS.snow) newStage=2;
    else if(score>=STAGE_THRESHOLDS.desert) newStage=1;
    if(newStage!==currentStage&&newStage!==previousStage){
      previousStage=currentStage;
      currentStage=newStage;
      // Stage transition flash
      stageFlashEl.className="";
      void stageFlashEl.offsetWidth;
      var flashColors=["rgba(255,220,80","rgba(255,170,70","rgba(160,220,255","rgba(80,80,200","rgba(80,255,205","rgba(20,10,40"];
      stageFlashEl.style.background=flashColors[currentStage]+",0.5)";
      stageFlashEl.classList.add("show");
      if(ENABLE_BOSSES) spawnBoss(currentStage);
    }
    if(score>=STAGE_THRESHOLDS.desert) unlockAchievement("reachDesert");
    if(score>=STAGE_THRESHOLDS.snow) unlockAchievement("score300");
    if(score>=STAGE_THRESHOLDS.storm) unlockAchievement("reachStorm");
    if(score>=STAGE_THRESHOLDS.aurora) unlockAchievement("reachAurora");
    if(score>=STAGE_THRESHOLDS.space) unlockAchievement("score1000");
    if(runTime>=60) unlockAchievement("survivor60");
  }

  function updateEffectTimers(dt){
    powerupTypes.forEach(function(type){ activeEffects[type]=Math.max(0,activeEffects[type]-dt); });
    if(comboTimer>0){ comboTimer=Math.max(0,comboTimer-dt); if(comboTimer===0) comboCount=0; }
    shootCooldown=Math.max(0,shootCooldown-dt);
    screenShakeTimer=Math.max(0,screenShakeTimer-dt);
    speedLineTimer=Math.max(0,speedLineTimer-dt);
    wingTrailBoost=Math.max(0,wingTrailBoost-dt);
    bulletTimeTimer=Math.max(0,bulletTimeTimer-dt);
    if(currentStage===5) asteroidWaveTimer=Math.max(0,asteroidWaveTimer-dt);
  }

  // ═══════════════════════════════════════════
  // INPUT
  // ═══════════════════════════════════════════
  function handlePointerMove(event){
    if(settings.controls==="keyboard") return;
    var x=event.clientX,y=event.clientY;
    if(event.touches&&event.touches.length){ x=event.touches[0].clientX; y=event.touches[0].clientY; }
    mousePos.x=-1+(x/WIDTH)*2;
    mousePos.y=1-(y/HEIGHT)*2;
  }
  function handleKeyDown(event){
    var target=event.target;
    var isTyping=target&&(target.tagName==="INPUT"||target.tagName==="SELECT");
    var key=event.key.toLowerCase();
    if(isTyping&&key!=="escape") return;
    if(["arrowleft","arrowright","arrowup","arrowdown"," "].indexOf(key)!==-1&&gameMode==="playing") event.preventDefault();
    if(key==="p"){ togglePause(); return; }
    if(key==="escape"){ if(gameMode==="playing") pauseGame(); else if(gameMode==="paused") resumeGame(); return; }
    if(key==="f"){ toggleFullscreen(); return; }
    if(key==="m"){ soundManager.setMuted(settings.sound!==false); return; }
    if((key==="enter"||key===" ")&&gameMode==="menu"){ startGame(); return; }
    if((key===" "||key==="spacebar")&&gameMode==="playing"){ fireBullet(); return; }
    keys[key]=true;
  }
  function handleKeyUp(event){ keys[event.key.toLowerCase()]=false; }
  function toggleFullscreen(){
    var root=document.documentElement;
    if(!document.fullscreenElement&&root.requestFullscreen) root.requestFullscreen();
    else if(document.exitFullscreen) document.exitFullscreen();
  }
  function applyKeyboardControls(){
    if(gameMode!=="playing"||settings.controls==="pointer") return;
    var step=0.025;
    if(keys["arrowleft"]||keys["a"]) mousePos.x-=step;
    if(keys["arrowright"]||keys["d"]) mousePos.x+=step;
    if(keys["arrowup"]||keys["w"]) mousePos.y+=step;
    if(keys["arrowdown"]||keys["s"]) mousePos.y-=step;
    mousePos.x=clamp(mousePos.x,-0.95,0.95);
    mousePos.y=clamp(mousePos.y,-0.95,0.95);
  }

  // ═══════════════════════════════════════════
  // SHOOTING / RISK EVENTS
  // ═══════════════════════════════════════════
  function triggerFeedback(kind){
    speedLineTimer=Math.max(speedLineTimer,0.35);
    wingTrailBoost=Math.max(wingTrailBoost,0.45);
    if(kind==="near"||kind==="hit") screenShakeTimer=Math.max(screenShakeTimer,0.24);
    if(kind==="bulletTime") screenShakeTimer=Math.max(screenShakeTimer,0.18);
  }
  function fireBullet(){
    if(gameMode!=="playing"||gameOver||shootCooldown>0) return false;
    var bullet=null;
    for(var i=0;i<bullets.length;i++){ if(!bullets[i].active){ bullet=bullets[i]; break; } }
    if(!bullet) return false;
    var p=airplane.mesh.position;
    bullet.active=true; bullet.life=1.35; bullet.mesh.visible=true;
    bullet.mesh.position.set(p.x+20,p.y,p.z-42);
    bullet.mesh.rotation.set(0,0,0);
    shootCooldown=shootCooldownMax;
    triggerFeedback("shoot");
    soundManager.playShoot();
    return true;
  }
  function deactivateBullet(bullet){
    bullet.active=false; bullet.life=0; bullet.mesh.visible=false; bullet.mesh.position.y=-2000;
  }
  function handleShotHit(target,type,bullet){
    deactivateBullet(bullet);
    var pts=(type==="asteroid"?45:30)*scoreMultiplier;
    score+=pts;
    spawnScorePopup("+"+pts,target.mesh.position.x,target.mesh.position.y,"boost");
    triggerFeedback("hit");
    soundManager.playBoost();
    if(type==="asteroid"){
      target.active=false; target.mesh.visible=false;
    } else {
      spawnObstacle(target,false);
    }
  }
  function updateBullets(dt){
    var gameSpeed=getGameSpeed();
    for(var i=0;i<bullets.length;i++){
      var bullet=bullets[i]; if(!bullet.active) continue;
      bullet.life-=dt; bullet.mesh.position.z-=36+gameSpeed*22; bullet.mesh.rotation.z+=0.35;
      if(bullet.life<=0||bullet.mesh.position.z<-3600){ deactivateBullet(bullet); continue; }
      for(var o=0;o<obstacles.length;o++){
        var obs=obstacles[o];
        var dx=bullet.mesh.position.x-obs.mesh.position.x, dy=bullet.mesh.position.y-obs.mesh.position.y, dz=bullet.mesh.position.z-obs.mesh.position.z;
        if(dx*dx+dy*dy+dz*dz<38*38){ handleShotHit(obs,"obstacle",bullet); break; }
      }
      if(!bullet.active) continue;
      for(var a=0;a<asteroids.length;a++){
        var ast=asteroids[a]; if(!ast.active) continue;
        var adx=bullet.mesh.position.x-ast.mesh.position.x, ady=bullet.mesh.position.y-ast.mesh.position.y, adz=bullet.mesh.position.z-ast.mesh.position.z;
        if(adx*adx+ady*ady+adz*adz<48*48){ handleShotHit(ast,"asteroid",bullet); break; }
      }
    }
  }
  function awardNearMiss(entity){
    if(entity.nearMissed) return;
    entity.nearMissed=true; nearMissCount++;
    var pts=18*scoreMultiplier;
    score+=pts; comboTimer=Math.max(comboTimer,1.4);
    spawnScorePopup(t("nearMiss")+" +"+pts,airplane.mesh.position.x,airplane.mesh.position.y+34,"combo");
    triggerFeedback("near");
    soundManager.playNearMiss();
  }
  function maybeTriggerFinalLifeBulletTime(){
    if(bulletTimeTriggered||settings.immortalMode) return;
    if(lives===1){
      bulletTimeTriggered=true; bulletTimeTimer=3.2; triggerFeedback("bulletTime"); soundManager.playBulletTime();
      spawnScorePopup(t("bulletTime"),airplane.mesh.position.x,airplane.mesh.position.y+50,"slow");
    }
  }
  function checkComboMilestones(){
    [25,50,100].forEach(function(n){
      if(comboCount>=n&&!comboMilestonesHit[n]){
        comboMilestonesHit[n]=true;
        spawnScorePopup("COMBO "+n+"!",airplane.mesh.position.x,airplane.mesh.position.y+58,"combo");
        triggerFeedback("near");
        soundManager.playAchievement();
      }
    });
  }
  function spawnAsteroidWave(){
    asteroidWaveActive=2.8; asteroidWaveTimer=8.5;
    var spawned=0;
    for(var i=0;i<asteroids.length;i++){
      if(!asteroids[i].active){ spawnAsteroid(asteroids[i],spawned); spawned++; }
      if(spawned>=4) break;
    }
    if(spawned>0){ spawnScorePopup(t("asteroidWave"),0,210,"boost"); triggerFeedback("near"); }
  }
  function updateAsteroids(dt){
    if(currentStage===5&&asteroidWaveTimer<=0) spawnAsteroidWave();
    asteroidWaveActive=Math.max(0,asteroidWaveActive-dt);
    var gameSpeed=getGameSpeed(), p=airplane.mesh.position, now=gameNow(), motionScale=getMotionScale();
    for(var i=0;i<asteroids.length;i++){
      var ast=asteroids[i]; if(!ast.active) continue;
      ast.mesh.position.z+=gameSpeed*15;
      ast.mesh.rotation.x+=0.024*motionScale; ast.mesh.rotation.y+=0.018*motionScale;
      ast.mesh.position.x+=Math.sin(now*0.002+i)*0.18*motionScale;
      if(ast.mesh.position.z>190){ ast.active=false; ast.mesh.visible=false; continue; }
      var dx=p.x-ast.mesh.position.x, dy=p.y-ast.mesh.position.y, dz=p.z-ast.mesh.position.z, d2=dx*dx+dy*dy+dz*dz;
      if(d2<90*90&&d2>42*42&&ast.mesh.position.z>-360&&ast.mesh.position.z<80) awardNearMiss(ast);
      if(d2<38*38&&hitTimer<=0){
        if(activeEffects.starPower>0){ score+=35*scoreMultiplier; ast.active=false; ast.mesh.visible=false; continue; }
        if(activeEffects.shield>0){ activeEffects.shield=0; hitTimer=0.65; ast.active=false; ast.mesh.visible=false; soundManager.playShieldBreak(); continue; }
        if(!settings.immortalMode){
          lives--; comboCount=0; comboTimer=0; hitTimer=0.45; soundManager.playObstacle(); ast.active=false; ast.mesh.visible=false; maybeTriggerFinalLifeBulletTime();
          if(lives<=0){ lives=0; if(score>=REVIVE_COST) showReviveScreen(); else showEndScreen(t("gameOverTitle"),t("gameOverText")); }
        }
      }
    }
  }

  // ═══════════════════════════════════════════
  // MAIN LOOP
  // ═══════════════════════════════════════════
  function stepFrame(dt){
    if(!renderer||!scene||!camera) return;
    var frameScale=clamp(dt*60,0.2,2.5);
    gameClock+=dt; frameCounter++;
    if(gameMode==="playing"&&!gameOver){
      var q=getQualityConfig(); var motionScale=getMotionScale();
      runTime+=dt; distance+=getGameSpeed()*110*dt;
      applyKeyboardControls(); updateEffectTimers(dt); updateStageProgression();
      if(SHOW_GROUND_PLANET&&land) land.mesh.rotation.z+=0.001*frameScale*motionScale;
      orbit.mesh.rotation.z+=0.001*frameScale*motionScale;
      sky.mesh.rotation.z+=0.0006*frameScale*motionScale;
      if(SHOW_GROUND_PLANET&&forest) forest.mesh.rotation.z+=0.001*frameScale*motionScale;
      if(SHOW_GROUND_PLANET&&cityWorld) cityWorld.rotation.z+=0.001*frameScale*motionScale;
      if(stars){
        stars.mesh.rotation.z+=0.00014*frameScale*motionScale;
        // Twinkle big stars by size-pulsing via opacity variation per layer
        if(currentStage>=4&&stars.points&&stars.points.material.opacity>0.5){
          stars.points.material.size=8+3*Math.sin(gameClock*2.1+0.7);
          if(stars.heroPoints) stars.heroPoints.material.size=18+8*Math.sin(gameClock*1.4);
        }
      }
      tickMissions(dt);
      updatePlane(); updateBullets(dt); updateCollectibles(); updatePowerups(); updateObstacles(); updateAsteroids(dt); updateBoss(dt); updateWeather();
      if(SHOW_GROUND_PLANET&&frameCounter%q.forestUpdateInterval===0) updateForest();
      if(frameCounter%q.cityUpdateInterval===0) updateCities();
    }
    updateBackgroundAndLighting();
    if(hitTimer>0){
      hitTimer=Math.max(0,hitTimer-dt);
      flashEl.style.opacity=String(Math.max(0,hitTimer*1.8));
    } else { flashEl.style.opacity="0"; }
    document.body.classList.toggle("shake",screenShakeTimer>0);
    speedLinesEl.classList.toggle("show",speedLineTimer>0);
    bulletTimeTintEl.classList.toggle("show",bulletTimeTimer>0);
    if(shootTouchBtn) shootTouchBtn.classList.toggle("cooling",shootCooldown>0);
    updateHUD();
    renderer.render(scene,camera);
  }
  function loop(timestamp){
    var dt=lastFrameTime?Math.min(0.05,(timestamp-lastFrameTime)/1000):1/60;
    lastFrameTime=timestamp;
    stepFrame(dt);
    requestAnimationFrame(loop);
  }

  // ═══════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════
  function bindTouchButton(button){
    var key=button.getAttribute("data-key");
    var start=function(e){ e.preventDefault(); if(key==="shoot"){ fireBullet(); return; } keys[key]=true; };
    var end=function(e){ e.preventDefault(); keys[key]=false; };
    button.addEventListener("pointerdown",start);
    button.addEventListener("pointerup",end);
    button.addEventListener("pointercancel",end);
    button.addEventListener("pointerleave",end);
  }
  function setupEvents(){
    document.addEventListener("mousemove",handlePointerMove,false);
    document.addEventListener("touchmove",handlePointerMove,{passive:false});
    document.addEventListener("pointermove",handlePointerMove,false);
    window.addEventListener("keydown",handleKeyDown,false);
    window.addEventListener("keyup",handleKeyUp,false);
    startBtn.addEventListener("click",startGame);
    leaderboardBtn.addEventListener("click",showLeaderboardPanel);
    shopBtn.addEventListener("click",showShopPanel);
    settingsBtn.addEventListener("click",showSettingsPanel);
    resumeBtn.addEventListener("click",resumeGame);
    restartBtn.addEventListener("click",restartGame);
    menuBtn.addEventListener("click",showMainMenu);
    reviveBtn.addEventListener("click",doRevive);
    pauseBtn.addEventListener("click",togglePause);
    fullscreenBtn.addEventListener("click",toggleFullscreen);
    muteBtn.addEventListener("click",function(){ soundManager.setMuted(settings.sound!==false); });
    reloadBtn.addEventListener("click",function(){ window.location.reload(); });
    languageSelect.addEventListener("change",function(){ settings.language=languageSelect.value; saveSettings(); applyLocalization(); });
    playerNameInput.addEventListener("input",function(){ settings.playerName=playerNameInput.value.trim()||"Pilot"; saveSettings(); });
    graphicsSelect.addEventListener("change",function(){ settings.graphics=graphicsSelect.value; saveSettings(); applyGraphicsSettings(); });
    controlSelect.addEventListener("change",function(){ settings.controls=controlSelect.value; saveSettings(); });
    soundToggle.addEventListener("change",function(){ soundManager.setMuted(!soundToggle.checked); });
    motionToggle.addEventListener("change",function(){ settings.reducedMotion=motionToggle.checked; saveSettings(); });
    immortalToggle.addEventListener("change",function(){ settings.immortalMode=immortalToggle.checked; saveSettings(); updateHUD(); });
    document.querySelectorAll(".touch-btn").forEach(bindTouchButton);
  }
  function showThreeError(){
    threeErrorEl.classList.add("show");
    threeErrorTextEl.textContent=t("threeError");
    reloadBtn.onclick=function(){ window.location.reload(); };
  }
  function init(){
    applyLocalization();
    if(window.__threeLoadFailed||!window.THREE){ showThreeError(); return; }
    createScene(); createLights(); createPlane();
    orbit=new Orbit(); orbit.mesh.position.y=offSet; orbit.mesh.rotation.z=-Math.PI/6; scene.add(orbit.mesh);
    createSun();
    stars=new Stars(); scene.add(stars.mesh);
    solarSystem=new SolarSystem(); scene.add(solarSystem.mesh);
    createLand(); createForest(); createCities(); createSky(); createWeather(); createGameObjects();
    setupEvents(); resetGame(false); showMainMenu(); applyGraphicsSettings(); applyLocalization();
    fetchGlobalLeaderboard();
    // Debug API
    window.__skyRunnerDebug={
      start:startGame, pause:pauseGame, resume:resumeGame,
      reset:function(){ resetGame(false); showMainMenu(); },
      setScore:function(v){ score=Math.max(0,Number(v)||0); updateStageProgression(); updateHUD(); },
      fire:fireBullet,
      forceCombo:function(v){ comboCount=Math.max(0,Number(v)||0); comboTimer=2.4; checkComboMilestones(); updateHUD(); },
      forceFinalLife:function(){ lives=1; maybeTriggerFinalLifeBulletTime(); updateHUD(); },
      forceObstacleAhead:function(){ if(obstacles[0]){ obstacles[0].mesh.position.set(airplane.mesh.position.x+18,airplane.mesh.position.y,-430); obstacles[0].nearMissed=false; } },
      forceAsteroidWave:function(){ currentStage=5; spawnAsteroidWave(); updateHUD(); },
      giveCoins:function(v){ totalCoins=clamp(totalCoins+(Number(v)||0),0,SCORE_LIMITS.coins); saveCoins(); renderShop(); updateHUD(); },
      state:function(){ return{mode:gameMode,score,lives,currencyReward:runCoins+(runSaved?0:calculateScoreCurrencyReward(score)),totalCoins,combo:comboCount,stage:currentStage,stageName:formatStageName(currentStage),boss:bossEnemy?{health:Math.round(bossEnemy.health),max:bossEnemy.maxHealth}:null,bullets:bullets.filter(function(b){return b.active;}).length,asteroids:asteroids.filter(function(a){return a.active;}).length,nearMisses:nearMissCount,bulletTime:Number(bulletTimeTimer.toFixed(2)),speed:getGameSpeed().toFixed(2)}; }
    };
    window.render_game_to_text=function(){
      return JSON.stringify({
        coordinateSystem:"Three.js scene; x left/right, y vertical, z depth toward camera",
        mode:gameMode, score:score, lives:lives, currencyReward:runCoins+(runSaved?0:calculateScoreCurrencyReward(score)), totalCoins:totalCoins,
        combo:comboCount, stage:currentStage, stageName:formatStageName(currentStage),
        player:{x:Number(airplane.mesh.position.x.toFixed(1)),y:Number(airplane.mesh.position.y.toFixed(1)),z:Number(airplane.mesh.position.z.toFixed(1))},
        rings:rings.slice(0,5).map(function(r){ return{x:Math.round(r.mesh.position.x),y:Math.round(r.mesh.position.y),z:Math.round(r.mesh.position.z)}; }),
        visibleCoins:coins.slice(0,5).map(function(c){ return{x:Math.round(c.mesh.position.x),y:Math.round(c.mesh.position.y),z:Math.round(c.mesh.position.z)}; }),
        obstacles:obstacles.slice(0,5).map(function(o){ return{x:Math.round(o.mesh.position.x),y:Math.round(o.mesh.position.y),z:Math.round(o.mesh.position.z),type:o.type}; }),
        bullets:bullets.filter(function(b){ return b.active; }).slice(0,6).map(function(b){ return{x:Math.round(b.mesh.position.x),y:Math.round(b.mesh.position.y),z:Math.round(b.mesh.position.z),life:Number(b.life.toFixed(2))}; }),
        bulletCooldown:Number(shootCooldown.toFixed(2)),
        nearMisses:nearMissCount,
        bulletTime:Number(bulletTimeTimer.toFixed(2)),
        asteroidWaveActive:Number(asteroidWaveActive.toFixed(2)),
        asteroids:asteroids.filter(function(a){ return a.active; }).slice(0,6).map(function(a){ return{x:Math.round(a.mesh.position.x),y:Math.round(a.mesh.position.y),z:Math.round(a.mesh.position.z),nearMissed:a.nearMissed}; }),
        powerups:powerups.slice(0,4).map(function(p){ return{x:Math.round(p.mesh.position.x),y:Math.round(p.mesh.position.y),z:Math.round(p.mesh.position.z),type:p.type}; }),
        boss:bossEnemy?{stage:bossEnemy.stage,health:Math.round(bossEnemy.health),max:bossEnemy.maxHealth,x:Math.round(bossEnemy.mesh.position.x),y:Math.round(bossEnemy.mesh.position.y),z:Math.round(bossEnemy.mesh.position.z)}:null,
        missions:activeMissions.map(function(m){ return{type:m.type,progress:Number(m.progress.toFixed(1)),target:m.target,done:m.done}; })
      });
    };
    window.advanceTime=function(ms){
      var steps=Math.max(1,Math.round((ms||16)/(1000/60)));
      for(var i=0;i<steps;i++) stepFrame(1/60);
      return window.render_game_to_text();
    };
    loop();
  }
  window.addEventListener("load",init,false);
  </script>
