<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Sky Runner Enhanced - 3D arcade flight game with particles, glow effects, combo popups, and multilingual UI." />
  <meta name="theme-color" content="#6fa7d9" />
  <title>Sky Runner — Enhanced Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,600;0,900;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffd45a;
      --gold-glow: rgba(255,212,90,0.45);
      --blue-light: #8fd3ff;
      --red-hit: #ff3a3a;
      --shield-blue: #41d6ff;
      --magnet-pink: #ff5c9a;
      --slow-green: #7df56d;
      --boost-orange: #ff9b33;
      --bg-panel: rgba(6,14,26,0.92);
      --border-subtle: rgba(255,255,255,0.14);
      --border-active: rgba(255,212,90,0.5);
      --font-hud: 'Share Tech Mono', monospace;
      --font-ui: 'Exo 2', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body {
      width:100%; height:100%;
      overflow:hidden;
      background:#000;
      font-family: var(--font-ui);
      color:#f8fbff;
      touch-action:none;
      user-select:none;
    }
    #world {
      position:absolute; inset:0; overflow:hidden;
      background:linear-gradient(to bottom,#07111f,#0b2a40);
    }

    /* ── HUD ── */
    #hud {
      position:absolute; top:0; left:0; width:100%; z-index:10;
      padding:12px 14px;
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
      pointer-events:none;
      font-family:var(--font-hud);
    }
    #stats { display:flex; gap:7px; flex-wrap:wrap; }
    .badge {
      pointer-events:none;
      background:linear-gradient(135deg,rgba(8,18,34,0.82),rgba(4,10,20,0.68));
      border:1px solid var(--border-subtle);
      border-radius:6px;
      padding:7px 11px;
      backdrop-filter:blur(14px);
      font-weight:600;
      font-size:13px;
      box-shadow:0 8px 24px rgba(0,0,0,0.28);
      min-height:34px;
      transition:border-color 0.3s;
    }
    .badge strong { color:var(--gold); }
    .badge.small { font-size:12px; padding:6px 9px; }
    .badge.glow { border-color:var(--gold-glow); box-shadow:0 0 16px var(--gold-glow), 0 8px 24px rgba(0,0,0,0.28); }
    .badge.shield-glow { border-color:rgba(65,214,255,0.5); box-shadow:0 0 16px rgba(65,214,255,0.3); }
    .badge.magnet-glow { border-color:rgba(255,92,154,0.5); box-shadow:0 0 16px rgba(255,92,154,0.3); }
    .badge.slow-glow { border-color:rgba(125,245,109,0.5); box-shadow:0 0 16px rgba(125,245,109,0.3); }
    .badge.boost-glow { border-color:rgba(255,155,51,0.5); box-shadow:0 0 16px rgba(255,155,51,0.3); }

    #help {
      max-width:380px; font-size:12px; line-height:1.4; opacity:0.88; text-align:right;
      background:rgba(6,14,26,0.44); border:1px solid rgba(255,255,255,0.1);
      border-radius:6px; padding:7px 10px; backdrop-filter:blur(8px);
      font-family:var(--font-hud);
    }

    /* ── Score popups ── */
    #scorePopupContainer {
      position:absolute; inset:0; pointer-events:none; z-index:18; overflow:hidden;
    }
    .score-popup {
      position:absolute;
      font-family:var(--font-hud);
      font-size:22px;
      font-weight:900;
      color:#fff;
      text-shadow:0 0 18px var(--gold), 0 2px 8px rgba(0,0,0,0.6);
      pointer-events:none;
      animation:popupFly 0.9s ease-out forwards;
    }
    @keyframes popupFly {
      0%   { transform:translateY(0) scale(1);   opacity:1; }
      60%  { transform:translateY(-45px) scale(1.1); opacity:1; }
      100% { transform:translateY(-85px) scale(0.85); opacity:0; }
    }
    .score-popup.combo { color:var(--gold); font-size:28px; text-shadow:0 0 24px var(--gold); }
    .score-popup.shield { color:var(--shield-blue); text-shadow:0 0 18px var(--shield-blue); }
    .score-popup.magnet { color:var(--magnet-pink); text-shadow:0 0 18px var(--magnet-pink); }
    .score-popup.slow { color:var(--slow-green); text-shadow:0 0 18px var(--slow-green); }
    .score-popup.boost { color:var(--boost-orange); text-shadow:0 0 18px var(--boost-orange); }

    /* ── Danger indicator ── */
    #dangerRing {
      position:absolute; inset:0; pointer-events:none; z-index:9;
      border-radius:0;
      box-shadow:inset 0 0 0 0 rgba(255,58,58,0);
      transition:box-shadow 0.12s;
    }
    #dangerRing.near { box-shadow:inset 0 0 60px 20px rgba(255,58,58,0.22); animation:dangerPulse 0.55s ease-in-out infinite; }
    #dangerRing.critical { box-shadow:inset 0 0 80px 30px rgba(255,58,58,0.45); animation:dangerPulse 0.28s ease-in-out infinite; }
    @keyframes dangerPulse {
      0%,100% { opacity:1; } 50% { opacity:0.35; }
    }

    /* ── Controls ── */
    #topControls {
      position:absolute; right:14px; bottom:14px;
      display:flex; gap:8px; z-index:15;
    }
    .icon-button {
      width:44px; height:44px; min-width:44px; padding:0; border-radius:8px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:17px; line-height:1; text-transform:none; letter-spacing:0;
      background:rgba(6,14,26,0.72); color:#fff;
      border:1px solid rgba(255,255,255,0.16);
      box-shadow:0 8px 24px rgba(0,0,0,0.22);
      cursor:pointer; transition:transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .icon-button:hover { transform:translateY(-2px); border-color:rgba(255,255,255,0.32); box-shadow:0 12px 32px rgba(0,0,0,0.3); }

    /* ── Flash & overlays ── */
    #flash {
      position:absolute; inset:0;
      background:radial-gradient(circle, rgba(255,58,58,0.55), rgba(255,58,58,0));
      opacity:0; pointer-events:none; z-index:8;
    }
    #shieldFlash {
      position:absolute; inset:0;
      background:radial-gradient(circle, rgba(65,214,255,0.38), rgba(65,214,255,0));
      opacity:0; pointer-events:none; z-index:8; transition:opacity 0.2s;
    }

    .overlay {
      position:absolute; inset:0; display:flex;
      align-items:center; justify-content:center;
      z-index:20; padding:16px;
      background:rgba(2,5,12,0.7);
      pointer-events:auto;
      transition:opacity 0.3s;
    }
    .overlay.hidden, #modal.hidden, #menuOverlay.hidden { display:none; }

    .panel {
      width:min(94vw,520px);
      max-height:min(92vh,760px);
      overflow:auto;
      background:var(--bg-panel);
      color:white;
      border:1px solid var(--border-subtle);
      border-radius:10px;
      padding:24px;
      text-align:center;
      box-shadow:0 30px 90px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter:blur(24px) saturate(1.2);
    }
    .release-panel {
      width:min(94vw,780px); text-align:left;
    }

    /* ── Typography ── */
    .panel h1 {
      font-family:var(--font-ui);
      font-size:clamp(36px,7vw,68px);
      font-weight:900; font-style:italic;
      line-height:0.9; margin-bottom:10px;
      letter-spacing:-2px;
      background:linear-gradient(135deg,#fff 30%,var(--gold) 70%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .panel h2 {
      font-family:var(--font-ui);
      font-size:20px; margin:0 0 12px;
      color:var(--gold); font-weight:600;
      letter-spacing:0.5px;
    }
    .panel p {
      font-size:15px; line-height:1.55; opacity:0.88; margin-bottom:16px;
    }

    .menu-grid {
      display:grid; grid-template-columns:1.1fr 0.9fr; gap:14px; margin-top:16px;
    }
    .menu-section {
      border:1px solid rgba(255,255,255,0.11); border-radius:8px;
      padding:14px; background:rgba(255,255,255,0.04);
    }
    .menu-actions, .modal-actions {
      display:flex; gap:9px; flex-wrap:wrap; justify-content:center; margin-top:16px;
    }
    .release-panel .menu-actions { justify-content:flex-start; }

    .stat-line, .setting-row, .leaderboard-row {
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,0.07);
      font-size:14px;
    }
    .leaderboard-status {
      display:inline-flex; align-items:center; gap:7px; margin-bottom:9px;
      padding:6px 8px; border-radius:6px;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      color:rgba(255,255,255,0.82); font-size:11px; font-weight:700;
      font-family:var(--font-hud);
    }
    .leaderboard-status::before {
      content:""; width:7px; height:7px; border-radius:50%;
      background:#ffbf4d; box-shadow:0 0 10px rgba(255,191,77,0.7);
    }
    .leaderboard-status.online::before { background:#58f29a; box-shadow:0 0 10px rgba(88,242,154,0.7); }
    .leaderboard-status.offline::before { background:#ff6b57; box-shadow:0 0 10px rgba(255,107,87,0.7); }
    .leaderboard-table {
      width:100%; border-collapse:collapse; font-size:12px; font-family:var(--font-hud);
    }
    .leaderboard-table th, .leaderboard-table td {
      padding:7px 5px; border-bottom:1px solid rgba(255,255,255,0.07);
      text-align:right; white-space:nowrap;
    }
    .leaderboard-table th:first-child, .leaderboard-table td:first-child {
      text-align:left; white-space:normal; min-width:100px;
    }
    .leaderboard-table th { color:var(--gold); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
    .leaderboard-table tr:last-child td { border-bottom:0; }
    .leaderboard-row:last-child, .stat-line:last-child, .setting-row:last-child { border-bottom:0; }
    .setting-row label { font-weight:700; }
    .setting-copy { display:grid; gap:2px; min-width:0; }
    .setting-copy small { color:rgba(255,255,255,0.6); font-size:11px; line-height:1.3; }

    select, input[type="text"] {
      min-width:140px; max-width:200px; border-radius:7px;
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(0,0,0,0.32); color:#fff;
      padding:9px 11px; font:inherit; font-size:13px;
    }
    input[type="checkbox"] { width:18px; height:18px; accent-color:var(--gold); }

    button {
      pointer-events:auto; border:0; border-radius:8px;
      padding:12px 17px; font-weight:800; font-size:15px;
      background:var(--gold); color:#06111f;
      cursor:pointer;
      transition:transform 0.15s, box-shadow 0.15s, background 0.15s;
      text-transform:uppercase; letter-spacing:0.5px;
      box-shadow:0 10px 26px rgba(0,0,0,0.28);
      min-height:44px; white-space:normal;
      font-family:var(--font-ui);
    }
    button.secondary {
      background:rgba(255,255,255,0.07); color:#fff;
      border:1px solid rgba(255,255,255,0.16);
    }
    button.danger { background:#ff6b57; color:#fff; }
    button:hover, button:focus-visible {
      transform:translateY(-2px);
      box-shadow:0 14px 34px rgba(0,0,0,0.35);
      outline:none;
    }
    button.secondary:hover { background:rgba(255,255,255,0.12); }

    /* ── Achievement popup ── */
    #achievementPopup {
      position:absolute; top:72px; left:50%;
      transform:translate(-50%,-20px);
      z-index:25; min-width:min(88vw,340px); max-width:400px;
      padding:13px 15px; border-radius:8px;
      background:rgba(5,13,26,0.94);
      border:1px solid rgba(255,212,90,0.5);
      box-shadow:0 16px 48px rgba(0,0,0,0.42), 0 0 24px rgba(255,212,90,0.2);
      opacity:0; pointer-events:none;
      transition:opacity 0.28s ease, transform 0.28s ease;
      text-align:center;
    }
    #achievementPopup.show { opacity:1; transform:translate(-50%,0); }
    #achievementTitle { font-weight:900; color:var(--gold); margin-bottom:4px; font-family:var(--font-ui); }
    #achievementDesc { font-size:13px; opacity:0.88; font-family:var(--font-hud); }

    /* ── Mobile controls ── */
    #mobileControls {
      position:absolute; left:12px; bottom:12px; z-index:14;
      display:none;
      grid-template-columns:repeat(3,52px);
      grid-template-rows:repeat(2,52px);
      gap:7px; opacity:0.9;
    }
    .touch-btn {
      min-width:52px; width:52px; height:52px; padding:0; border-radius:8px;
      background:rgba(6,14,26,0.68); color:#fff;
      border:1px solid rgba(255,255,255,0.18); font-size:22px; text-transform:none;
    }
    .touch-btn[data-key="arrowup"]    { grid-column:2; grid-row:1; }
    .touch-btn[data-key="arrowleft"]  { grid-column:1; grid-row:2; }
    .touch-btn[data-key="arrowdown"]  { grid-column:2; grid-row:2; }
    .touch-btn[data-key="arrowright"] { grid-column:3; grid-row:2; }
    .touch-btn.shoot-btn {
      grid-column:4; grid-row:2;
      background:rgba(255,212,90,0.82); color:#06111f;
      border-color:rgba(255,255,255,0.42);
      box-shadow:0 0 18px rgba(255,212,90,0.32);
      font-size:18px;
    }
    .touch-btn.shoot-btn.cooling { opacity:0.45; filter:saturate(0.55); }

    /* ── Error ── */
    #threeError {
      position:absolute; inset:0; z-index:100;
      display:none; align-items:center; justify-content:center;
      padding:20px; background:#06111f; color:#fff; text-align:center;
    }
    #threeError.show { display:flex; }

    /* ── State classes ── */
    .is-menu #hud, .is-menu #mobileControls, .is-menu #pauseBtn, .is-menu #missionTracker, .is-menu #bossHud { display:none; }
    .is-paused #missionTracker, .is-gameover #missionTracker { display:none; }
    .is-playing #menuOverlay, .is-paused #menuOverlay, .is-gameover #menuOverlay { display:none; }

    /* ── Combo streak bar ── */
    #comboBar {
      position:absolute; bottom:0; left:0; height:3px;
      background:linear-gradient(90deg, var(--gold), #fff);
      width:0%; z-index:12; pointer-events:none;
      transition:width 0.12s linear, opacity 0.3s;
      box-shadow:0 0 12px var(--gold);
      opacity:0;
    }
    #comboBar.active { opacity:1; }

    #speedLines {
      position:absolute; inset:0; z-index:7; pointer-events:none; opacity:0;
      background:
        repeating-linear-gradient(90deg, transparent 0 48px, rgba(255,255,255,0.16) 49px 50px, transparent 51px 120px),
        radial-gradient(circle at center, transparent 0 25%, rgba(255,255,255,0.18) 55%, transparent 80%);
      mix-blend-mode:screen;
      transition:opacity 0.18s;
    }
    #speedLines.show { opacity:0.75; animation:speedLines 0.42s ease-out forwards; }
    @keyframes speedLines {
      0% { transform:scaleX(0.85); opacity:0.8; }
      100% { transform:scaleX(1.18); opacity:0; }
    }
    #bulletTimeTint {
      position:absolute; inset:0; z-index:8; pointer-events:none; opacity:0;
      background:radial-gradient(circle, rgba(140,220,255,0.08), rgba(40,120,255,0.2));
      transition:opacity 0.25s;
    }
    #bulletTimeTint.show { opacity:1; }
    body.shake #world { animation:screenShake 0.28s linear; }
    @keyframes screenShake {
      0%,100% { transform:translate(0,0); }
      20% { transform:translate(-5px,2px); }
      40% { transform:translate(4px,-2px); }
      60% { transform:translate(-3px,-3px); }
      80% { transform:translate(3px,2px); }
    }

    #missionTracker {
      position:absolute; left:14px; top:76px; z-index:13;
      width:min(330px,calc(100vw - 28px));
      display:grid; gap:6px; pointer-events:none;
      font-family:var(--font-hud);
    }
    .mission-row {
      background:rgba(5,13,26,0.64);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:7px; padding:7px 8px;
      backdrop-filter:blur(10px);
      box-shadow:0 8px 24px rgba(0,0,0,0.18);
    }
    .mission-row.done { border-color:rgba(255,212,90,0.5); background:rgba(255,212,90,0.12); }
    .mission-row .top { display:flex; justify-content:space-between; gap:8px; font-size:11px; color:#e8f2ff; }
    .mission-row .bar { height:3px; margin-top:5px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,0.12); }
    .mission-row .bar span { display:block; height:100%; background:linear-gradient(90deg,var(--gold),#fff); width:0%; box-shadow:0 0 10px var(--gold); }

    #bossHud {
      position:absolute; top:68px; left:50%; transform:translateX(-50%);
      z-index:14; width:min(520px,82vw); display:none;
      font-family:var(--font-hud); pointer-events:none;
    }
    #bossHud .label {
      display:flex; justify-content:space-between; margin-bottom:5px;
      font-size:12px; color:#ffdede; text-shadow:0 0 12px rgba(255,80,80,0.7);
    }
    #bossHud .track {
      height:9px; border-radius:999px; overflow:hidden;
      background:rgba(30,0,0,0.75); border:1px solid rgba(255,100,100,0.45);
      box-shadow:0 0 22px rgba(255,64,64,0.25);
    }
    #bossHealthFill { height:100%; width:100%; background:linear-gradient(90deg,#ff3b3b,#ffb347); }

    .shop-grid {
      display:grid; grid-template-columns:1fr; gap:8px; max-height:360px; overflow:auto; padding-right:2px;
    }
    .shop-card {
      display:grid; grid-template-columns:auto 1fr auto; gap:9px; align-items:center;
      padding:9px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.04); text-align:left;
    }
    .shop-card .ico { font-size:21px; width:28px; text-align:center; }
    .shop-card .name { font-weight:800; font-size:13px; }
    .shop-card .desc { font-size:11px; color:rgba(255,255,255,0.64); margin-top:2px; }
    .shop-card button { min-height:34px; padding:8px 10px; font-size:12px; border-radius:7px; }
    .shop-card button:disabled { opacity:0.45; cursor:not-allowed; transform:none; }

    /* ── Stage transition flash ── */
    #stageFlash {
      position:absolute; inset:0; pointer-events:none; z-index:11;
      opacity:0;
    }
    #stageFlash.show { animation:stageTransition 1.2s ease-out forwards; }
    @keyframes stageTransition {
      0%   { opacity:0.8; } 100% { opacity:0; }
    }

    /* ── Utilities ── */
    .hidden { display:none !important; }
    .sr-only {
      position:absolute; width:1px; height:1px; padding:0;
      margin:-1px; overflow:hidden; clip:rect(0,0,0,0);
      white-space:nowrap; border:0;
    }

    @media (max-width:700px) {
      #hud { flex-direction:column; align-items:flex-start; padding:8px; gap:6px; }
      #stats { gap:5px; }
      .badge { font-size:11px; padding:6px 7px; min-height:28px; }
      #help { text-align:left; max-width:none; font-size:11px; padding:6px 7px; }
      .panel h1 { font-size:32px; }
      .panel { padding:16px; }
      .menu-grid { grid-template-columns:1fr; }
      .setting-row { align-items:flex-start; flex-direction:column; }
      select, input[type="text"] { width:100%; max-width:none; }
      #topControls { right:8px; bottom:8px; }
      #mobileControls { display:grid; grid-template-columns:repeat(4,52px); }
      #missionTracker { top:auto; bottom:122px; left:8px; width:min(310px,calc(100vw - 16px)); }
      #bossHud { top:104px; width:90vw; }
    }
  </style>
</head>
<body class="is-menu">
  <div id="world"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="stats">
      <div class="badge"><span id="scoreLabel">Score</span>: <strong id="score">0</strong></div>
      <div class="badge"><span id="bestLabel">Best</span>: <strong id="bestScore">0</strong></div>
      <div class="badge"><span id="livesLabel">Lives</span>: <span id="lives">❤❤❤</span></div>
      <div class="badge"><span id="coinsLabel">Coins</span>: <strong id="coins">0</strong></div>
      <div class="badge"><span id="comboLabel">Combo</span>: <strong id="combo">0</strong></div>
      <div class="badge"><span id="speedLabel">Speed</span>: <strong id="speed">1.0x</strong></div>
      <div class="badge"><span id="stageLabel">Stage</span>: <strong id="stageName">Sunny</strong></div>
      <div class="badge small" id="powerupBadge" style="display:none"><span id="powerupLabel">Powerup</span>: <strong id="powerupText"></strong></div>
      <div class="badge small" id="cityBadge" style="display:none"><span id="cityPrefix">Flying over</span>: <strong id="cityName">Tokyo</strong></div>
    </div>
    <div id="help"></div>
  </div>

  <!-- Combo progress bar -->
  <div id="comboBar"></div>
  <div id="speedLines"></div>
  <div id="bulletTimeTint"></div>
  <div id="missionTracker"></div>
  <div id="bossHud">
    <div class="label"><span id="bossName">BOSS</span><span id="bossHealthText">100%</span></div>
    <div class="track"><div id="bossHealthFill"></div></div>
  </div>

  <!-- Stage transition flash -->
  <div id="stageFlash"></div>

  <!-- Score popup container -->
  <div id="scorePopupContainer"></div>

  <!-- Controls -->
  <div id="topControls">
    <button id="pauseBtn" class="icon-button" type="button" aria-label="Pause" title="Pause">⏸</button>

  var soundManager={
    audioContext:null, musicNodes:[], musicPlaying:false,
    muted:settings.sound===false,
    init:function(){
      if(this.audioContext) return;
      try{ this.audioContext=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    },
    ensureReady:function(){
      this.init();
      if(this.audioContext&&this.audioContext.state==="suspended") this.audioContext.resume();
    },
    isSilent:function(){ return this.muted||settings.sound===false; },
    setMuted:function(val){
      this.muted=val; settings.sound=!val; saveSettings();
      if(val) this.stopMusic();
      else if(gameMode==="playing"){ this.ensureReady(); this.startMusic(); }
      applyLocalization();
    },
    _play:function(freq,type,dur,gainVal,rampFreq){
      if(!this.audioContext||this.isSilent()) return;
      var o=this.audioContext.createOscillator();
      var g=this.audioContext.createGain();
      o.connect(g); g.connect(this.audioContext.destination);
      o.type=type||'sine';
      o.frequency.setValueAtTime(freq,this.audioContext.currentTime);
      if(rampFreq) o.frequency.exponentialRampToValueAtTime(rampFreq,this.audioContext.currentTime+dur);
      g.gain.setValueAtTime(gainVal||0.35,this.audioContext.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01,this.audioContext.currentTime+dur);
      o.start(this.audioContext.currentTime);
      o.stop(this.audioContext.currentTime+dur);
    },
    playCollect:function(combo){
      if(!this.audioContext||this.isSilent()) return;
      var baseFreq=880+Math.min(combo*30,440);
      this._play(baseFreq,'sine',0.2,0.38,Math.min(baseFreq*2,3500));
    },
    playObstacle:function(){ this._play(150,'sawtooth',0.4,0.5,50); },
    playStart:function(){ this._play(220,'sine',0.6,0.35,880); },
    playPowerup:function(){
      if(!this.audioContext||this.isSilent()) return;
      var now=this.audioContext.currentTime;
      [440,660,880].forEach(function(f,i){
        var o=soundManager.audioContext.createOscillator();
        var g=soundManager.audioContext.createGain();
        o.connect(g); g.connect(soundManager.audioContext.destination);
        o.type="triangle"; o.frequency.setValueAtTime(f,now+i*0.06);
        g.gain.setValueAtTime(0.25,now+i*0.06);
        g.gain.exponentialRampToValueAtTime(0.01,now+0.3+i*0.06);
        o.start(now+i*0.06); o.stop(now+0.4+i*0.06);
      });
    },
    playBoost:function(){ this._play(300,'square',0.5,0.28,1200); },
    playShieldBreak:function(){ this._play(440,'sawtooth',0.3,0.4,110); },
    playAchievement:function(){
      if(!this.audioContext||this.isSilent()) return;
      var now=this.audioContext.currentTime;
      [523,659,784,1046].forEach(function(freq,i){
        var o=soundManager.audioContext.createOscillator();
        var g=soundManager.audioContext.createGain();
        o.connect(g); g.connect(soundManager.audioContext.destination);
        o.type="sine"; o.frequency.setValueAtTime(freq,now+i*0.07);
        g.gain.setValueAtTime(0.2,now+i*0.07);
        g.gain.exponentialRampToValueAtTime(0.01,now+0.4+i*0.07);
        o.start(now+i*0.07); o.stop(now+0.5+i*0.07);
      });
    },
    playShoot:function(){ this._play(760,'square',0.12,0.12,1120); },
    playNearMiss:function(){ this._play(980,'triangle',0.18,0.16,1460); },
    playBulletTime:function(){ this._play(180,'sine',0.55,0.24,90); },
    startMusic:function(){
      if(!this.audioContext||this.isSilent()||this.musicPlaying) return;
      this.musicPlaying=true;
      this._scheduleMusic();
    },
    _scheduleMusic:function(){
      if(!this.musicPlaying||!this.audioContext||this.isSilent()) return;
      var ctx=this.audioContext;
      var scales=[
        [261.63,329.63,392,523.25],
        [220,277.18,329.63,440],
        [196,246.94,293.66,392],
        [146.83,196,233.08,293.66],
        [311.13,369.99,466.16,622.25],
        [98,130.81,196,261.63]
      ];
      var scale=scales[currentStage]||scales[0];
      var beat=(settings.reducedMotion?0.72:0.48);
      var note=scale[Math.floor(Math.random()*scale.length)]*(Math.random()<0.22?2:1);
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.type=currentStage>=4?'triangle':'sine';
      o.frequency.setValueAtTime(note,ctx.currentTime);
      g.gain.setValueAtTime(0.0001,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.035,ctx.currentTime+0.04);
      g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+beat);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime); o.stop(ctx.currentTime+beat+0.04);
      this.musicNodes.push({osc:o,gain:g});
      var self=this;
      setTimeout(function(){
        self.musicNodes=self.musicNodes.filter(function(n){ return n.osc!==o; });
        self._scheduleMusic();
      },beat*1000);
    },
    stopMusic:function(){
      if(!this.audioContext) return;
      this.musicPlaying=false;
      this.musicNodes.forEach(function(node){
        node.gain.gain.linearRampToValueAtTime(0,soundManager.audioContext.currentTime+1);
        setTimeout(function(){ try{ node.osc.stop(); }catch(e){} },1000);
      });
      this.musicNodes=[];
    }
  };

  function normalizeScoreNumber(v,max){ return clamp(Math.round(Number(v)||0),0,max); }
  function normalizeScoreDate(v){
    var ts=Date.parse(String(v||""));
    var now=Date.now();
    if(!isFinite(ts)||ts>now+86400000||ts<1704067200000) ts=now;
    return new Date(ts).toISOString();
  }
  function sanitizeScoreEntry(entry){
    if(!entry||entry.immortalMode===true) return null;
    var name=normalizePlayerName(entry.name);
    var rawScore=Number(entry.score);
    if(!isFinite(rawScore)||rawScore<0) return null;
    if(rawScore>SCORE_LIMITS.score) return null;
    var sc=normalizeScoreNumber(entry.score,SCORE_LIMITS.score);
    var combo=normalizeScoreNumber(entry.combo,SCORE_LIMITS.combo);
    var ri=normalizeScoreNumber(entry.rings,SCORE_LIMITS.rings);
    var dist=normalizeScoreNumber(entry.distance,SCORE_LIMITS.distance);
    var rt=Math.min(SCORE_LIMITS.runTime,Math.max(0,Number(entry.runTime)||0));
    var stage=clamp(Math.round(Number(entry.stage)||0),0,5);
    var date=normalizeScoreDate(entry.date);
    var rawId=String(entry.id||"x");
    var id=rawId.replace(/[^a-z0-9а-яёқңғүұәөһі._:-]/gi,"").slice(0,96)||"id-"+sc+"-"+date;
    if(!name||sc<0) return null;
    return{id,name,score:sc,combo,stage,rings:ri,distance:dist,runTime:Number(rt.toFixed(1)),date};
  }
  function normalizeScoreEntries(entries){
    if(!Array.isArray(entries)) return [];
    return entries.map(sanitizeScoreEntry).filter(Boolean);
  }
  function mergeScoreEntries(local,remote){
    var byId={};
    normalizeScoreEntries(remote).concat(normalizeScoreEntries(local)).forEach(function(e){ byId[e.id]=e; });
    return Object.keys(byId).map(function(id){ return byId[id]; }).sort(function(a,b){
      if(b.score!==a.score) return b.score-a.score;
      if(b.combo!==a.combo) return b.combo-a.combo;
      return String(b.date).localeCompare(String(a.date));
    });
  }
  function getAllScoreEntries(){ return mergeScoreEntries(highScores,globalHighScores); }
  function getBestScore(){
    if(cachedBestScore!==null) return cachedBestScore;
    var best=0;
    getAllScoreEntries().forEach(function(e){ best=Math.max(best,Number(e.score)||0); });
    cachedBestScore=best;
    return cachedBestScore;
  }
  function getLeaderboardRows(){
    var players={};
    getAllScoreEntries().forEach(function(entry){
      var name=normalizePlayerName(entry.name);
      if(!players[name]) players[name]={name,best:0,runs:0,bestCombo:0,lastScore:0,lastDate:"",stage:0};
      var row=players[name];
      var es=Number(entry.score)||0;
      var ec=Number(entry.combo)||0;
      row.runs++;
      row.best=Math.max(row.best,es);
      row.bestCombo=Math.max(row.bestCombo,ec);
      row.stage=Math.max(row.stage,Number(entry.stage)||0);
      if(!row.lastDate||String(entry.date||"")>row.lastDate){ row.lastDate=String(entry.date||""); row.lastScore=es; }
    });
    return Object.keys(players).map(function(n){ return players[n]; }).sort(function(a,b){
      if(b.best!==a.best) return b.best-a.best;
      if(b.bestCombo!==a.bestCombo) return b.bestCombo-a.bestCombo;
      return b.runs-a.runs;
    });
  }

  function setLeaderboardStatus(status){ leaderboardStatus=status; if(currentSidePanel==="leaderboard") renderLeaderboard(); }
  function fetchGlobalLeaderboard(){
    if(!GLOBAL_LEADERBOARD_ENDPOINT||!window.fetch){ setLeaderboardStatus("offline"); return Promise.resolve([]); }
    setLeaderboardStatus("loading");
    return fetch(GLOBAL_LEADERBOARD_ENDPOINT+"?t="+Date.now(),{method:"GET",headers:{"Accept":"application/json"},cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("GET "+r.status); return r.json(); })
      .then(function(data){
        globalHighScores=normalizeScoreEntries(data&&(data.scores||(data.data&&data.data.scores)));
        invalidateBestScore(); setLeaderboardStatus("online"); renderMenuStats(); return globalHighScores;
      }).catch(function(){ setLeaderboardStatus("offline"); return []; });
  }
  function syncGlobalScore(entry){
    if(!GLOBAL_LEADERBOARD_ENDPOINT||!window.fetch||leaderboardSyncing) return;
    if(settings.immortalMode) return;
    var now=Date.now();
    var lastSync=Number(loadJSON(STORAGE_KEYS.lastScoreSync,0))||0;
    if(now-lastSync<GLOBAL_SYNC_COOLDOWN_MS) return;
    saveJSON(STORAGE_KEYS.lastScoreSync,now);
    leaderboardSyncing=true; setLeaderboardStatus("saving");
    fetch(GLOBAL_LEADERBOARD_ENDPOINT+"?t="+Date.now(),{method:"GET",headers:{"Accept":"application/json"},cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(data){
        var merged=mergeScoreEntries(highScores.concat([entry]),data&&(data.scores||(data.data&&data.data.scores))).slice(0,GLOBAL_SCORE_LIMIT);
        return fetch(GLOBAL_LEADERBOARD_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify({version:1,updatedAt:new Date().toISOString(),scores:merged})})
          .then(function(r){ if(!r.ok) throw new Error(r.status); globalHighScores=merged; invalidateBestScore(); setLeaderboardStatus("online"); });
      }).catch(function(){ setLeaderboardStatus("offline"); })
      .then(function(){ leaderboardSyncing=false; renderLeaderboard(); });
  }
  function saveHighScore(){
    if(runSaved||(score<=0&&runTime<1)) return;
    runSaved=true;
    if(settings.immortalMode){ renderMenuStats(); renderLeaderboard(); return; }
    runCoins+=calculateScoreCurrencyReward(score);
    var entry=sanitizeScoreEntry({
      id:makeRunId(),name:normalizePlayerName(settings.playerName),score,combo:bestComboThisRun,
      stage:currentStage,rings:ringsCollectedThisRun,distance:Math.round(distance),
      runTime:Number(runTime.toFixed(1)),date:new Date().toISOString()
    });
    if(!entry) return;
    highScores.push(entry);
    highScores.sort(function(a,b){ return String(b.date||"").localeCompare(String(a.date||"")); });
    highScores=normalizeScoreEntries(highScores).slice(0,LOCAL_SCORE_LIMIT);
    saveJSON(STORAGE_KEYS.highScores,highScores);
    invalidateBestScore();
    stats.totalScore+=score; stats.totalRings+=ringsCollectedThisRun;
    totalCoins+=runCoins; saveCoins();
    if(totalCoins>=100) unlockAchievement("coins100");
    stats.totalDistance+=Math.round(distance); stats.bestCombo=Math.max(stats.bestCombo||0,bestComboThisRun);
    stats.totalCoins+=runCoins; stats.totalPowerups+=powerupsThisRun;
    saveStats(); renderMenuStats(); renderLeaderboard(); syncGlobalScore(entry);
  }

  function generateMissions(){
    var pool=MISSION_POOL.slice(), out=[];
    while(out.length<3&&pool.length){
      var i=Math.floor(Math.random()*pool.length), m=pool.splice(i,1)[0];
      var scale=1+Math.min(stats.gamesPlayed||0,24)*0.035;
      out.push({type:m.type,target:Math.round(m.target*scale),reward:m.reward,key:m.key,progress:0,done:false});
    }
    activeMissions=out; renderMissions();
  }
  function updateMissionProgress(type,value){
    var changed=false;
    activeMissions.forEach(function(m){
      if(m.done||m.type!==type) return;
      if(type==="combo") m.progress=Math.max(m.progress,Math.min(m.target,value));
      else m.progress=Math.min(m.target,m.progress+value);
      if(m.progress>=m.target){
        m.done=true; runCoins+=m.reward; spawnScorePopup("★ +"+m.reward,airplane.mesh.position.x,airplane.mesh.position.y+45,"combo"); soundManager.playAchievement();
      }
      changed=true;
    });
    if(changed) renderMissions();
  }

  var HEIGHT,WIDTH;
  function createScene(){
    HEIGHT=window.innerHeight; WIDTH=window.innerWidth;
    scene=new THREE.Scene();
    scene.fog=new THREE.FogExp2(0x000000,0.0006);
    camera=new THREE.PerspectiveCamera(60,WIDTH/HEIGHT,1,10000);
    camera.position.set(0,150,100);
    renderer=new THREE.WebGLRenderer({alpha:true,antialias:getQualityConfig().antialias,powerPreference:"high-performance"});
    renderer.setClearColor(0x000000,0);
    renderer.setSize(WIDTH,HEIGHT);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,getQualityConfig().pixelRatioCap));
    renderer.shadowMap.enabled=settings.graphics!=="low";
    renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    container=document.getElementById("world");
    container.appendChild(renderer.domElement);
    window.addEventListener("resize",handleWindowResize,false);
  }
  function handleWindowResize(){
    HEIGHT=window.innerHeight; WIDTH=window.innerWidth;
    renderer.setSize(WIDTH,HEIGHT);
    camera.aspect=WIDTH/HEIGHT;
    camera.updateProjectionMatrix();
  }
  function createLights(){
    hemisphereLight=new THREE.HemisphereLight(0xddeeff,0x1d2f1d,0.85);
    shadowLight=new THREE.DirectionalLight(0xfff4dc,1.35);
    shadowLight.position.set(-220,520,480);
    shadowLight.castShadow=true;
    shadowLight.shadow.camera.left=-700; shadowLight.shadow.camera.right=700;
    shadowLight.shadow.camera.top=700; shadowLight.shadow.camera.bottom=-700;
    shadowLight.shadow.camera.near=1; shadowLight.shadow.camera.far=1200;
    var q=getQualityConfig();
    shadowLight.shadow.mapSize.width=q.shadowSize; shadowLight.shadow.mapSize.height=q.shadowSize;
    shadowLight.shadow.bias=-0.0001;
    scene.add(hemisphereLight); scene.add(shadowLight);
    scene.add(new THREE.AmbientLight(0x2b3440,0.35));
    var rimLight=new THREE.DirectionalLight(0x9fd8ff,0.45);
    rimLight.position.set(420,180,-520);
    scene.add(rimLight);
  }

  // ═══════════════════════════════════════════
  // SCENE OBJECTS (using BufferGeometry where possible)
  // ═══════════════════════════════════════════
  function Land(){
    var geom=new THREE.CylinderGeometry(3000,3000,4000,40,10);
    // Displace vertices for low-poly look
    var pos=geom.attributes.position;
    for(var i=0;i<pos.count;i++){
      pos.setX(i,pos.getX(i)+(-15+Math.random()*30));
      pos.setY(i,pos.getY(i)+(-15+Math.random()*30));
      pos.setZ(i,pos.getZ(i)+(-15+Math.random()*30));
    }
    pos.needsUpdate=true; geom.computeVertexNormals();
    var mat=new THREE.MeshStandardMaterial({color:0x2f9b4b,roughness:0.96,metalness:0.02,flatShading:true});
    this.mesh=new THREE.Mesh(geom,mat);
    this.mesh.rotation.x=-Math.PI/2;
    this.mesh.receiveShadow=true;
  }
  function Orbit(){ this.mesh=new THREE.Object3D(); }
  function Sun(){
    this.mesh=new THREE.Object3D();
    var sunMesh=new THREE.Mesh(new THREE.SphereGeometry(400,32,32),new THREE.MeshBasicMaterial({color:0xfff4c6}));
    var aura=new THREE.Mesh(new THREE.SphereGeometry(490,32,32),new THREE.MeshBasicMaterial({color:0xffbb55,transparent:true,opacity:0.32}));
    var aura2=new THREE.Mesh(new THREE.SphereGeometry(610,32,32),new THREE.MeshBasicMaterial({color:0xff5500,transparent:true,opacity:0.14}));
    this.mesh.add(sunMesh); this.mesh.add(aura); this.mesh.add(aura2);
  }
  function Stars(){
    this.mesh=new THREE.Object3D();
    var q=getQualityConfig();
    var count=Math.max(q.stars,3500);

    // ── Layer 1: medium bright stars — varied colors like real sky ──
    var pos1=new Float32Array(count*3);
    var col1=new Float32Array(count*3);
    for(var i=0;i<count;i++){
      pos1[i*3]=(Math.random()-0.5)*22000;
      pos1[i*3+1]=(Math.random()-0.5)*22000;
      pos1[i*3+2]=Math.random()*-18000-800;
      var t=Math.random();
      if(t<0.5){  col1[i*3]=1;    col1[i*3+1]=1;    col1[i*3+2]=1;    } // pure white
      else if(t<0.65){ col1[i*3]=0.78; col1[i*3+1]=0.88; col1[i*3+2]=1; } // blue-white
      else if(t<0.78){ col1[i*3]=1;    col1[i*3+1]=0.96; col1[i*3+2]=0.7; } // warm yellow
      else if(t<0.88){ col1[i*3]=1;    col1[i*3+1]=0.7;  col1[i*3+2]=0.5; } // orange
      else{            col1[i*3]=0.65; col1[i*3+1]=0.78; col1[i*3+2]=1; }   // blue
    }
    var geom1=new THREE.BufferGeometry();
    geom1.setAttribute("position",new THREE.BufferAttribute(pos1,3));
    geom1.setAttribute("color",new THREE.BufferAttribute(col1,3));
    var mat1=new THREE.PointsMaterial({vertexColors:true,size:7,sizeAttenuation:true,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
    this.points=new THREE.Points(geom1,mat1);
    this.mesh.add(this.points);

    // ── Layer 2: MASSIVE tiny star field — like the Milky Way ──
    var count2=Math.round(count*5);
    var pos2=new Float32Array(count2*3);
    var col2=new Float32Array(count2*3);
    for(var j=0;j<count2;j++){
      pos2[j*3]=(Math.random()-0.5)*28000;
      pos2[j*3+1]=(Math.random()-0.5)*28000;
      pos2[j*3+2]=Math.random()*-20000-1500;
      var brightness=0.55+Math.random()*0.45;
      var tint=Math.random();
      if(tint<0.6){ col2[j*3]=brightness;col2[j*3+1]=brightness;col2[j*3+2]=brightness; }
      else if(tint<0.8){ col2[j*3]=brightness*0.8;col2[j*3+1]=brightness*0.88;col2[j*3+2]=brightness; }
      else{ col2[j*3]=brightness;col2[j*3+1]=brightness*0.9;col2[j*3+2]=brightness*0.7; }
    }
    var geom2=new THREE.BufferGeometry();
    geom2.setAttribute("position",new THREE.BufferAttribute(pos2,3));
    geom2.setAttribute("color",new THREE.BufferAttribute(col2,3));
    var mat2=new THREE.PointsMaterial({vertexColors:true,size:1.8,sizeAttenuation:true,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
    this.points2=new THREE.Points(geom2,mat2);
    this.mesh.add(this.points2);

    // ── Layer 3: hero "giant" stars — large, bright, twinkling ──
    var heroCount=120;
    var pos3=new Float32Array(heroCount*3);
    var col3=new Float32Array(heroCount*3);
    for(var k=0;k<heroCount;k++){
      pos3[k*3]=(Math.random()-0.5)*15000;
      pos3[k*3+1]=(Math.random()-0.5)*15000;
      pos3[k*3+2]=Math.random()*-12000-500;
      var t3=Math.random();
      if(t3<0.35){ col3[k*3]=1;col3[k*3+1]=1;col3[k*3+2]=0.92; }
      else if(t3<0.6){ col3[k*3]=0.7;col3[k*3+1]=0.86;col3[k*3+2]=1; }
      else if(t3<0.8){ col3[k*3]=1;col3[k*3+1]=0.88;col3[k*3+2]=0.65; }
      else{ col3[k*3]=1;col3[k*3+1]=0.55;col3[k*3+2]=0.4; } // red giant
    }
    var geom3=new THREE.BufferGeometry();
    geom3.setAttribute("position",new THREE.BufferAttribute(pos3,3));
    geom3.setAttribute("color",new THREE.BufferAttribute(col3,3));
    var mat3=new THREE.PointsMaterial({vertexColors:true,size:20,sizeAttenuation:true,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
    this.heroPoints=new THREE.Points(geom3,mat3);
    this.mesh.add(this.heroPoints);

    // ── Layer 4: ultra-fine dust stars — cosmic density ──
    var count4=Math.round(count*8);
    var pos4=new Float32Array(count4*3);
    var col4=new Float32Array(count4*3);
    for(var m=0;m<count4;m++){
      pos4[m*3]=(Math.random()-0.5)*32000;
      pos4[m*3+1]=(Math.random()-0.5)*32000;
      pos4[m*3+2]=Math.random()*-24000-3000;
      var b4=0.3+Math.random()*0.5;
      col4[m*3]=b4; col4[m*3+1]=b4; col4[m*3+2]=b4*1.1;
    }
    var geom4=new THREE.BufferGeometry();
    geom4.setAttribute("position",new THREE.BufferAttribute(pos4,3));
    geom4.setAttribute("color",new THREE.BufferAttribute(col4,3));
    var mat4=new THREE.PointsMaterial({vertexColors:true,size:1.0,sizeAttenuation:true,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
    this.dustPoints=new THREE.Points(geom4,mat4);
    this.mesh.add(this.dustPoints);

    // ── Layer 5: Milky Way band — dense cluster in a diagonal strip ──
    var mwCount=Math.round(count*3);
    var pos5=new Float32Array(mwCount*3);
    var col5=new Float32Array(mwCount*3);
    for(var n=0;n<mwCount;n++){
      // Gaussian-like band across the sky (diagonal strip)
      var bandX=(Math.random()-0.5)*30000;
      var bandY=bandX*0.25+(Math.random()-0.5)*5000; // diagonal band
      pos5[n*3]=bandX;
      pos5[n*3+1]=bandY;
      pos5[n*3+2]=Math.random()*-22000-4000;
      var b5=0.2+Math.random()*0.4;
      // Milky Way has blue-white and warm tints
      var mwT=Math.random();
      if(mwT<0.5){ col5[n*3]=b5*0.85;col5[n*3+1]=b5*0.92;col5[n*3+2]=b5; }
      else{ col5[n*3]=b5;col5[n*3+1]=b5*0.95;col5[n*3+2]=b5*0.8; }
    }
    var geom5=new THREE.BufferGeometry();
    geom5.setAttribute("position",new THREE.BufferAttribute(pos5,3));
    geom5.setAttribute("color",new THREE.BufferAttribute(col5,3));
    var mat5=new THREE.PointsMaterial({vertexColors:true,size:1.3,sizeAttenuation:true,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
    this.milkyPoints=new THREE.Points(geom5,mat5);
    this.mesh.add(this.milkyPoints);

    // ── Layer 6: colorful nebula specks — pinks/purples/teals ──
    var nebCount=Math.round(count*0.8);
    var pos6=new Float32Array(nebCount*3);
    var col6=new Float32Array(nebCount*3);
    var nebColors=[[1,0.4,0.8],[0.6,0.3,1],[0.3,0.9,1],[1,0.6,0.3],[0.5,1,0.6]];
    for(var p6=0;p6<nebCount;p6++){
      pos6[p6*3]=(Math.random()-0.5)*18000;
      pos6[p6*3+1]=(Math.random()-0.5)*18000;
      pos6[p6*3+2]=Math.random()*-15000-2000;
      var nc=nebColors[Math.floor(Math.random()*nebColors.length)];
      var nbi=0.25+Math.random()*0.45;
      col6[p6*3]=nc[0]*nbi; col6[p6*3+1]=nc[1]*nbi; col6[p6*3+2]=nc[2]*nbi;
    }

  function createWeather(){
    var count=getQualityConfig().weatherParticles;
    weatherPositions=new Float32Array(count*3);
    weatherWindOffsets=new Float32Array(count);
    for(var p=0;p<count;p++){
      weatherPositions[p*3]=Math.random()*2000-1000;
      weatherPositions[p*3+1]=Math.random()*2000-500;
      weatherPositions[p*3+2]=Math.random()*2000-1000;
      weatherWindOffsets[p]=Math.random()*Math.PI*2;
    }
    var pGeom=new THREE.BufferGeometry();
    pGeom.setAttribute("position",new THREE.BufferAttribute(weatherPositions,3));
    var pMat=new THREE.PointsMaterial({color:0xffffff,size:6,transparent:true,opacity:0.82,blending:THREE.AdditiveBlending,sizeAttenuation:true});
    weatherParticles=new THREE.Points(pGeom,pMat);
    weatherParticles.visible=false;
    scene.add(weatherParticles);
    // Lightning
    var lVerts=[];
    for(var i=0;i<25;i++) lVerts.push(0,-i*35,0);
    var lPos=new Float32Array(lVerts);
    var lGeom=new THREE.BufferGeometry();
    lGeom.setAttribute("position",new THREE.BufferAttribute(new Float32Array(25*3),3));
    var lMat=new THREE.LineBasicMaterial({color:0xffffaa,transparent:true,opacity:0.9});
    lightningMesh=new THREE.Line(lGeom,lMat);
    lightningMesh.position.set(0,400,-300); lightningMesh.visible=false;
    scene.add(lightningMesh);
  }
  function updateWeather(){
    if(!weatherParticles) return;
    var pos=weatherParticles.geometry.attributes.position.array;
    var now=gameNow(); var n=pos.length/3;
    var motionScale=getMotionScale();
    if(currentStage===0){
      weatherParticles.visible=false; lightningMesh.visible=false;
    } else if(currentStage===1){
      weatherParticles.visible=true; lightningMesh.visible=false;
      weatherParticles.material.color.setHex(0xffd08a); weatherParticles.material.size=4;
      for(var si=0;si<n;si++){
        pos[si*3]-=(10+Math.sin(now*0.002+weatherWindOffsets[si])*3)*motionScale;
        pos[si*3+1]+=Math.sin(now*0.003+weatherWindOffsets[si])*0.5;
        if(pos[si*3]<-1000) pos[si*3]=1000;
      }
      weatherParticles.geometry.attributes.position.needsUpdate=true;
    } else if(currentStage===2){
      weatherParticles.visible=true; lightningMesh.visible=false;
      weatherParticles.material.color.setHex(0xffffff); weatherParticles.material.size=5;
      for(var i=0;i<n;i++){
        pos[i*3+1]-=1.5;
        pos[i*3]+=Math.sin(now*0.001+weatherWindOffsets[i])*0.8*motionScale;
        pos[i*3+2]+=Math.cos(now*0.001+weatherWindOffsets[i])*0.3*motionScale;
        if(pos[i*3+1]<-500) pos[i*3+1]=1500;
      }
      weatherParticles.geometry.attributes.position.needsUpdate=true;
    } else if(currentStage===3){
      weatherParticles.visible=true;
      weatherParticles.material.color.setHex(0xaaaaaa); weatherParticles.material.size=13;
      for(var i=0;i<n;i++){
        pos[i*3+1]-=45;
        pos[i*3]-=(6+Math.sin(now*0.002+weatherWindOffsets[i])*2)*motionScale;
        if(pos[i*3+1]<-500) pos[i*3+1]=1500;
      }
      weatherParticles.geometry.attributes.position.needsUpdate=true;
      if(Math.random()>0.965&&lightningTimer<=0){
        lightningTimer=0.6; lightningMesh.visible=true;
        lightningMesh.position.x=rand(-400,400); lightningMesh.position.z=rand(-600,-100);
        var lp=lightningMesh.geometry.attributes.position.array;
        for(var l=1;l<25;l++){
          lp[l*3]=lp[(l-1)*3]+rand(-35,35);
          lp[l*3+1]=lp[(l-1)*3+1]-35;
          lp[l*3+2]=lp[(l-1)*3+2]+rand(-35,35);
        }
        lightningMesh.geometry.attributes.position.needsUpdate=true;
      }
      if(lightningTimer>0){ lightningTimer-=0.04; if(lightningTimer<=0) lightningMesh.visible=false; }
    } else if(currentStage===4){
      weatherParticles.visible=true; lightningMesh.visible=false;
      weatherParticles.material.color.setHex(0x64ffd0); weatherParticles.material.size=7;
      for(var ai=0;ai<n;ai++){
        pos[ai*3]+=Math.sin(now*0.002+weatherWindOffsets[ai])*1.2*motionScale;
        pos[ai*3+1]+=Math.cos(now*0.0015+weatherWindOffsets[ai])*0.8*motionScale;
        pos[ai*3+2]+=7;
        if(pos[ai*3+2]>200) pos[ai*3+2]=-1800;
      }
      weatherParticles.geometry.attributes.position.needsUpdate=true;
    } else {
      weatherParticles.visible=true; lightningMesh.visible=false;
      weatherParticles.material.color.setHex(0xffffff); weatherParticles.material.size=3;
      for(var i=0;i<n;i++){
        pos[i*3+2]+=12;
        pos[i*3]+=Math.sin(now*0.0005+weatherWindOffsets[i])*0.2*motionScale;
        if(pos[i*3+2]>200) pos[i*3+2]=-1800;
      }
      weatherParticles.geometry.attributes.position.needsUpdate=true;
    }
  }

  function spawnRing(ring,initial){
    var idx=rings.indexOf(ring);
    var formation=Math.floor((score/450)+idx)%4;
    var x=rand(-180,160), y=rand(60,250);
    if(formation===1){ x=-120+(idx%6)*48; y=125+Math.sin(idx*0.8)*55; }
    else if(formation===2){ var a=idx/rings.length*Math.PI*2; x=Math.cos(a)*115-35; y=150+Math.sin(a)*80; }
    else if(formation===3){ x=-165+(idx%4)*88; y=70+Math.floor(idx/4)*44; }
    ring.mesh.position.set(x,y,initial?rand(-2600,-1000):rand(-2800,-1200));
    ring.mesh.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    var s=1+Math.random()*0.4; ring.mesh.scale.set(s,s,s);
    ring.collected=false;
  }
  function spawnCoin(coin,initial){
    coin.mesh.position.set(rand(-185,160),rand(60,240),initial?rand(-4200,-1300):rand(-5200,-1800));
    coin.mesh.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    var s=0.8+Math.random()*0.45; coin.mesh.scale.set(s,s,s);
  }
  function spawnObstacle(obstacle,initial){
    var targetType=currentStage;
    if(currentStage>0){
      var r=Math.random();
      if(currentStage===1) targetType=r>0.55?0:3;
      else if(currentStage===2) targetType=r>0.72?0:1;
      else if(currentStage===3){ if(r>0.7) targetType=2; else if(r>0.3) targetType=1; else targetType=0; }
      else if(currentStage===4) targetType=r>0.5?2:3;
      else if(currentStage===5) targetType=r>0.35?3:2;
    }
    if(obstacle.type!==targetType){
      scene.remove(obstacle.mesh);
      var idx=obstacles.indexOf(obstacle);
      obstacle=new Obstacle(targetType);
      scene.add(obstacle.mesh);
      obstacles[idx]=obstacle;
    }
    obstacle.mesh.position.set(rand(-215,215),rand(38,252),initial?rand(-4600,-1500):rand(-5600,-1900));
    obstacle.mesh.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    var s=0.8+Math.random()*0.8; obstacle.mesh.scale.set(s,s,s);
    obstacle.nearMissed=false;
  }
  function spawnPowerup(powerup,initial){
    powerup.type=powerupTypes[Math.floor(Math.random()*powerupTypes.length)];
    scene.remove(powerup.mesh);
    var fresh=new PowerUp(powerup.type);
    fresh.mesh.position.set(rand(-170,150),rand(70,230),initial?rand(-5600,-2200):rand(-7000,-3200));
    fresh.collected=false;
    scene.add(fresh.mesh);
    var idx=powerups.indexOf(powerup);
    if(idx!==-1) powerups[idx]=fresh;
  }
  function spawnAsteroid(asteroid,delayIndex){
    asteroid.active=true; asteroid.nearMissed=false; asteroid.mesh.visible=true;
    asteroid.mesh.position.set(rand(-230,220),rand(45,260),-2600-(delayIndex||0)*280-rand(0,260));

  }

  function resetGame(startNow){
    if(reviveInterval) clearInterval(reviveInterval);
    maxLives=getStartingLives();
    score=0; lives=maxLives; gameOver=!startNow; hitTimer=0;
    runTime=0; distance=0; comboCount=0; comboTimer=0;
    bestComboThisRun=0; ringsCollectedThisRun=0; runCoins=0; powerupsThisRun=0;
    currentStage=0; previousStage=-1; scoreMultiplier=1;
    activeEffects={shield:0,magnet:0,slow:0,boost:0,score2x:0,timeWarp:0,starPower:0,extraLife:0};
    bossSpawnedStages={}; if(bossEnemy){ scene.remove(bossEnemy.mesh); bossEnemy=null; }
    shootCooldown=0; nearMissCount=0; screenShakeTimer=0; speedLineTimer=0; wingTrailBoost=0;
    bulletTimeTimer=0; bulletTimeTriggered=false; asteroidWaveTimer=0; asteroidWaveActive=0;
    comboMilestonesHit={};
    for(var b=0;b<bullets.length;b++){ bullets[b].active=false; bullets[b].mesh.visible=false; }
    for(var a=0;a<asteroids.length;a++){ asteroids[a].active=false; asteroids[a].mesh.visible=false; }
    runSaved=false; frameCounter=0;
    mousePos={x:0,y:0};
    airplane.mesh.position.set(-40,110,-250);
    airplane.mesh.rotation.set(0,0,0);
    airplane.propeller.rotation.set(0,0,0);
    for(var i=0;i<rings.length;i++) spawnRing(rings[i],true);
    for(var j=0;j<obstacles.length;j++) spawnObstacle(obstacles[j],true);
    for(var k=0;k<powerups.length;k++) spawnPowerup(powerups[k],true);
    generateMissions();
    modalEl.classList.add("hidden");
    updateHUD();
    if(startNow){ soundManager.playStart(); soundManager.startMusic(); }
  }
  function startGame(){
    soundManager.ensureReady();
    stats.gamesPlayed=(stats.gamesPlayed||0)+1; saveStats();
    gameMode="playing"; setBodyMode("playing");
    menuOverlayEl.classList.add("hidden"); modalEl.classList.add("hidden");
    resetGame(true); renderMenuStats();
  }
  function restartGame(){ startGame(); }
  function showMainMenu(){
    if(reviveInterval) clearInterval(reviveInterval);
    gameMode="menu"; gameOver=true; setBodyMode("menu");
    modalEl.classList.add("hidden"); menuOverlayEl.classList.remove("hidden");
    soundManager.stopMusic(); renderMenuStats();
    comboBarEl.classList.remove("active");
    dangerRingEl.className="";
    if(currentSidePanel==="settings") showSettingsPanel(); else showLeaderboardPanel();
  }
  function pauseGame(){
    if(gameMode!=="playing") return;
    gameMode="paused"; gameOver=true; setBodyMode("paused");
    soundManager.stopMusic();
    modalTitleEl.textContent=t("pausedTitle"); modalTextEl.textContent=t("pausedText");
    runSummaryEl.style.display="none"; runDetailsEl.style.display="none";
    reviveBtn.style.display="none"; resumeBtn.style.display="inline-block";
    restartBtn.style.display="inline-block"; menuBtn.style.display="inline-block";
    modalEl.classList.remove("hidden");
  }
  function resumeGame(){
    if(gameMode!=="paused") return;
    gameMode="playing"; gameOver=false; setBodyMode("playing");
    modalEl.classList.add("hidden"); soundManager.startMusic();
  }
  function togglePause(){ if(gameMode==="playing") pauseGame(); else if(gameMode==="paused") resumeGame(); }

  // ═══════════════════════════════════════════
  // HUD UPDATE
  // ═══════════════════════════════════════════
  function updateHUD(){
    var baseSpeed=getBaseGameSpeed();
    var baseMultiplier=baseSpeed>=2.0?3:(baseSpeed>=1.45?2:1);
    var comboBonus=Math.min(4,Math.floor(comboCount/5)*getComboUpgradeBonus());
    scoreMultiplier=Math.min(8,Math.round((baseMultiplier+comboBonus)*getUpgradeScoreBonus()*(activeEffects.score2x>0?2:1)));

    var scoreText=score+(scoreMultiplier>1?" (×"+scoreMultiplier+")":"");
    setTextIfChanged(scoreEl,"score",scoreText);
    setTextIfChanged(bestScoreEl,"bestScore",Math.max(getBestScore(),score));

    // Lives as hearts
    var heartsHTML="";
    for(var i=0;i<maxLives;i++){
      heartsHTML+="<span style='color:"+(i<lives?"#ff4d4d":"#555");
      heartsHTML+="'>❤</span>";
    }
    setHTMLIfChanged(livesEl,"lives",heartsHTML);
    var displayedCurrency=runCoins+(runSaved?0:calculateScoreCurrencyReward(score));
    setTextIfChanged(coinsEl,"coins","+"+displayedCurrency+" / "+totalCoins);

    setTextIfChanged(comboEl,"combo",comboCount+(comboTimer>0?" /"+Math.ceil(comboTimer)+"s":""));
    setTextIfChanged(speedEl,"speed",getGameSpeed().toFixed(1)+"x");
    setTextIfChanged(stageNameEl,"stageName",formatStageName(currentStage));

    var powerupText=getActivePowerupText();
    setDisplayIfChanged(powerupBadgeEl,"powerupDisplay",powerupText?"inline-block":"none");
    setTextIfChanged(powerupTextEl,"powerupText",powerupText);

    // Combo bar
    if(comboTimer>0){
      comboBarEl.classList.add("active");
      comboBarEl.style.width=(comboTimer/2.4*100)+"%";
    } else {
      comboBarEl.classList.remove("active");
      comboBarEl.style.width="0%";
    }

    // Powerup badge glow class
    var glowClass="badge small";
    if(activeEffects.shield>0) glowClass+=" shield-glow";
    else if(activeEffects.magnet>0) glowClass+=" magnet-glow";
    else if(activeEffects.slow>0) glowClass+=" slow-glow";
    else if(activeEffects.boost>0) glowClass+=" boost-glow";
    if(powerupBadgeEl.className!==glowClass) powerupBadgeEl.className=glowClass;
    if(bossEnemy){
      var pct=clamp(bossEnemy.health/bossEnemy.maxHealth,0,1);
      bossHudEl.style.display="block";
      bossNameEl.textContent=t("boss")+" · "+formatStageName(bossEnemy.stage);
      bossHealthTextEl.textContent=Math.ceil(pct*100)+"%";
      bossHealthFillEl.style.width=(pct*100)+"%";
    } else {
      bossHudEl.style.display="none";
    }
  }

  function showEndScreen(title,text){
    if(reviveInterval) clearInterval(reviveInterval);
    saveHighScore(); gameMode="gameover"; setBodyMode("gameover");
    updateHUD();
    soundManager.stopMusic();
    modalTitleEl.textContent=title; modalTextEl.textContent=text;
    runSummaryEl.style.display="flex"; runSummaryScoreEl.textContent=score;
    runDetailsEl.style.display="block";
    runDetailsEl.textContent="Rings: "+ringsCollectedThisRun+" · Currency: +"+runCoins+" · Combo: "+bestComboThisRun+" · Time: "+Math.floor(runTime)+"s";
    resumeBtn.style.display="none"; reviveBtn.style.display="none";
    restartBtn.style.display="inline-block"; menuBtn.style.display="inline-block";
    modalEl.classList.remove("hidden");
    comboBarEl.classList.remove("active");
    dangerRingEl.className="";
  }
  function showReviveScreen(){
    gameMode="revive"; gameOver=true; reviveTimer=5; setBodyMode("gameover");
    modalTitleEl.textContent=t("crashTitle");
    modalTextEl.textContent=t("reviveText",{cost:REVIVE_COST,seconds:reviveTimer});
    runSummaryEl.style.display="flex"; runSummaryScoreEl.textContent=score;
    runDetailsEl.style.display="none";
    resumeBtn.style.display="none"; reviveBtn.style.display="inline-block";
    restartBtn.style.display="inline-block"; menuBtn.style.display="inline-block";
    modalEl.classList.remove("hidden");
    reviveInterval=setInterval(function(){
      reviveTimer--;
      if(reviveTimer>0) modalTextEl.textContent=t("reviveText",{cost:REVIVE_COST,seconds:reviveTimer});
      else{ clearInterval(reviveInterval); showEndScreen(t("gameOverTitle"),t("gameOverText")); }
    },1000);
  }
  function doRevive(){
    if(score>=REVIVE_COST){
      clearInterval(reviveInterval); score-=REVIVE_COST; lives=maxLives;
      gameMode="playing"; gameOver=false; hitTimer=1.5;
      activeEffects.shield=Math.max(activeEffects.shield,POWERUP_DURATIONS.reviveShield);
      stats.totalRevives=(stats.totalRevives||0)+1; saveStats();
      unlockAchievement("revive");
      for(var i=0;i<obstacles.length;i++){
        if(obstacles[i].mesh.position.z>-1000) spawnObstacle(obstacles[i],false);
      }
      modalEl.classList.add("hidden"); setBodyMode("playing");
      soundManager.startMusic(); updateHUD();
    }
  }

  // ═══════════════════════════════════════════
  // PLANE UPDATE
  // ═══════════════════════════════════════════
  function updatePlane(){
    var targetY=normalize(mousePos.y,-0.75,0.75,50,190);
    var targetX=normalize(mousePos.x,-0.75,0.75,-100,-20);
    var smooth=0.08;
    airplane.mesh.position.y+=(targetY-airplane.mesh.position.y)*smooth;
    airplane.mesh.position.x+=(targetX-airplane.mesh.position.x)*smooth;
    airplane.mesh.rotation.z+=((targetY-airplane.mesh.position.y)*0.015-airplane.mesh.rotation.z)*0.15;
    airplane.mesh.rotation.x+=((airplane.mesh.position.y-targetY)*0.008-airplane.mesh.rotation.x)*0.15;
    airplane.mesh.rotation.y+=((airplane.mesh.position.x-targetX)*0.008-airplane.mesh.rotation.y)*0.15;

    var gameSpeed=getGameSpeed();
    airplane.propeller.rotation.x+=0.35*gameSpeed;
    var motionScale=getMotionScale();
    airplane.mesh.position.y+=Math.sin(gameNow()*0.002)*0.1*motionScale;

    // Afterburner effect on boost
    var boostAlpha=activeEffects.boost>0?0.85:(wingTrailBoost>0?0.38:0);
    airplane.afterburnerR.material.opacity=boostAlpha;
    airplane.afterburnerL.material.opacity=boostAlpha;
    if(activeEffects.boost>0){
      var flicker=0.7+Math.random()*0.3;
      airplane.afterburnerR.scale.setScalar(flicker*2);
      airplane.afterburnerL.scale.setScalar(flicker*2);
    }

    // Exhaust particles (BufferGeometry)
    var ePos=exhaustParticles.geometry.attributes.position.array;
    var count=ePos.length/3;
    var p=exhaustIdx;
    ePos[p*3]=airplane.mesh.position.x-15;
    ePos[p*3+1]=airplane.mesh.position.y-2;
    ePos[p*3+2]=airplane.mesh.position.z;
    exhaustLifes[p]=1.0;
    exhaustVelocities[p]={x:(-Math.random()*3-3),y:(Math.random()*3-1.5),z:(Math.random()*3-1.5)};
    exhaustIdx=(exhaustIdx+1)%count;
    for(var i=0;i<count;i++){
      if(exhaustLifes[i]>0){
        exhaustLifes[i]-=0.035;
        ePos[i*3]+=exhaustVelocities[i].x; ePos[i*3+1]+=exhaustVelocities[i].y-0.5; ePos[i*3+2]+=exhaustVelocities[i].z;
        exhaustVelocities[i].x*=0.98; exhaustVelocities[i].y*=0.98; exhaustVelocities[i].z*=0.98;
      } else { ePos[i*3+1]=-1000; }
    }
    exhaustParticles.geometry.attributes.position.needsUpdate=true;
    exhaustParticles.material.color.setHex(activeEffects.boost>0?0xff6600:(currentStage>=5?0xffaa00:0x88ccff));
  }

  var currentSkyColors={tR:105,tG:143,tB:196,bR:155,bG:206,bB:230,hInt:0.95,sInt:1.25};
  function updateBackgroundAndLighting(){
    var target={tR:105,tG:143,tB:196,bR:155,bG:206,bB:230,hInt:0.95,sInt:1.25};
    var targetOffSet=-3000;
    if(currentStage===1){
      target={tR:222,tG:168,tB:95,bR:117,bG:74,bB:47,hInt:0.95,sInt:1.1};
      sun.mesh.visible=true;
    } else if(currentStage===2){
      target={tR:205,tG:218,tB:232,bR:118,bG:145,bB:172,hInt:0.82,sInt:0.72};
      sun.mesh.visible=false;
    } else if(currentStage===3){
      target={tR:38,tG:44,tB:53,bR:12,bG:17,bB:24,hInt:0.42,sInt:0.32};
      sun.mesh.visible=false;
    } else if(currentStage===4){
      target={tR:12,tG:25,tB:48,bR:2,bG:35,bB:38,hInt:0.42,sInt:0.46};
      sun.mesh.visible=false;
      if(stars){
        stars.points.material.opacity=lerp(stars.points.material.opacity,0.6,0.025);
        if(stars.points2) stars.points2.material.opacity=lerp(stars.points2.material.opacity,0.5,0.025);
        if(stars.heroPoints) stars.heroPoints.material.opacity=lerp(stars.heroPoints.material.opacity,0.5,0.025);
      }
    } else if(currentStage===5){
      target={tR:2,tG:2,tB:8,bR:0,bG:0,bB:4,hInt:0.22,sInt:0.18};
      sun.mesh.visible=false; targetOffSet=-5000;
      var now3=gameClock;
      if(stars){
        var targetOp=1.0;
        stars.points.material.opacity=lerp(stars.points.material.opacity,targetOp,0.025);
        if(stars.points2) stars.points2.material.opacity=lerp(stars.points2.material.opacity,targetOp*0.85,0.025);
        if(stars.heroPoints) stars.heroPoints.material.opacity=lerp(stars.heroPoints.material.opacity,targetOp*0.9,0.025);
        // Twinkle: modulate hero star sizes via opacity flicker
        if(stars.heroPoints){
          var hOp=0.65+0.35*Math.sin(now3*1.8);
          stars.heroPoints.material.opacity=Math.min(1,stars.points.material.opacity)*hOp;
        }
        // Gentle drift
        stars.mesh.rotation.z+=0.00006;
        stars.mesh.rotation.x+=0.000025;
      }
      if(solarSystem){
        solarSystem.mesh.visible=true;
        solarSystem._time=(solarSystem._time||0)+0.016;
        var st=solarSystem._time;
        solarSystem.mesh.position.y=lerp(solarSystem.mesh.position.y,120,0.008);
        // Sun corona pulsing
        if(solarSystem.sunCorona1){
          var pulse=1+0.04*Math.sin(st*2.2);
          var pulse2=1+0.07*Math.sin(st*1.5+1);
          var pulse3=1+0.12*Math.sin(st*0.9+2.4);
          solarSystem.sunCorona1.scale.setScalar(pulse);
          solarSystem.sunCorona2.scale.setScalar(pulse2);
        }
        if(solarSystem.sunGroup) solarSystem.sunGroup.rotation.y+=0.002;
        // Planet rotations (each planet spins on own axis)
        solarSystem.planets.forEach(function(p,i){
          var speed=[0.018,0.013,0.010,0.014,0.035,0.022,0.016,0.012][i]||0.01;
          p.rotation.y+=speed;
        });
        // Earth clouds drift
        if(solarSystem.earthClouds) solarSystem.earthClouds.rotation.y+=0.003;
        // Jupiter bands visual drift
        if(solarSystem.jupiterGroup) solarSystem.jupiterGroup.rotation.y+=0.028;
        // Orbit groups gentle tilt sway
        solarSystem.orbitGroups.forEach(function(og,i){
          og.rotation.z=Math.sin(st*0.15+i*0.7)*0.012;
        });
        // Saturn ring shimmer
        if(solarSystem.saturnGroup) solarSystem.saturnGroup.rotation.y+=0.008;
        // Uranus wobble
        if(solarSystem.uranusGroup) solarSystem.uranusGroup.rotation.z=Math.PI/2+Math.sin(st*0.3)*0.05;
      }
    } else {
      sun.mesh.visible=true;
      if(stars){
        stars.points.material.opacity=lerp(stars.points.material.opacity,0,0.06);
        if(stars.points2) stars.points2.material.opacity=lerp(stars.points2.material.opacity,0,0.06);
        if(stars.heroPoints) stars.heroPoints.material.opacity=lerp(stars.heroPoints.material.opacity,0,0.06);
      }
      if(solarSystem){
        solarSystem.mesh.position.y=lerp(solarSystem.mesh.position.y,-2000,0.025);
        if(solarSystem.mesh.position.y<-1900) solarSystem.mesh.visible=false;
      }
    }
    offSet=lerp(offSet,targetOffSet,0.02);
    if(land){ land.mesh.position.y=offSet; }
    if(forest) forest.mesh.position.y=offSet;
    if(sky) sky.mesh.position.y=offSet;
    if(orbit) orbit.mesh.position.y=offSet;
    var spd=0.05;
    currentSkyColors.tR=lerp(currentSkyColors.tR,target.tR,spd);
    currentSkyColors.tG=lerp(currentSkyColors.tG,target.tG,spd);
    currentSkyColors.tB=lerp(currentSkyColors.tB,target.tB,spd);
    currentSkyColors.bR=lerp(currentSkyColors.bR,target.bR,spd);
    currentSkyColors.bG=lerp(currentSkyColors.bG,target.bG,spd);
    currentSkyColors.bB=lerp(currentSkyColors.bB,target.bB,spd);
    currentSkyColors.hInt=lerp(currentSkyColors.hInt,target.hInt,0.1);
    currentSkyColors.sInt=lerp(currentSkyColors.sInt,target.sInt,0.1);
    container.style.background="linear-gradient(to bottom,rgb("+
      Math.round(currentSkyColors.tR)+","+Math.round(currentSkyColors.tG)+","+Math.round(currentSkyColors.tB)+"),rgb("+
      Math.round(currentSkyColors.bR)+","+Math.round(currentSkyColors.bG)+","+Math.round(currentSkyColors.bB)+"))";
    scene.fog.color.setRGB(currentSkyColors.bR/255,currentSkyColors.bG/255,currentSkyColors.bB/255);
    hemisphereLight.intensity=currentSkyColors.hInt;
    shadowLight.intensity=currentSkyColors.sInt;
  }

  // ═══════════════════════════════════════════
  // COLLECTIBLES UPDATE
  // ═══════════════════════════════════════════
  function updateCollectibles(){
    var gameSpeed=getGameSpeed(); var planePos=airplane.mesh.position;
    var now=gameNow(); var motionScale=getMotionScale();
    var currentColor=ringColors[currentStage]; var currentEmissive=ringEmissives[currentStage];

    // Check for nearest obstacle (danger meter)
    var nearestObstacleDist=9999;
    for(var oi=0;oi<obstacles.length;oi++){
      var obs=obstacles[oi];
      var odx=planePos.x-obs.mesh.position.x;
      var ody=planePos.y-obs.mesh.position.y;
      var odz=planePos.z-obs.mesh.position.z;
      var od=Math.sqrt(odx*odx+ody*ody+odz*odz);
      if(od<nearestObstacleDist) nearestObstacleDist=od;
    }
    if(nearestObstacleDist<80) dangerRingEl.className="critical";
    else if(nearestObstacleDist<140) dangerRingEl.className="near";
    else dangerRingEl.className="";

    for(var i=0;i<rings.length;i++){
      var ring=rings[i];
      if(ring.torus.material.color.getHex()!==currentColor){
        ring.torus.material.color.setHex(currentColor);
        ring.torus.material.emissive.setHex(currentEmissive);
      }
      ring.mesh.position.z+=gameSpeed*11;
      ring.mesh.rotation.y+=(0.03+Math.sin(now*0.001+i)*0.02)*motionScale;
      ring.mesh.rotation.x+=(0.015+Math.cos(now*0.0015+i)*0.01)*motionScale;
      ring.mesh.position.y+=Math.sin(now*0.003+i*0.5)*0.2*motionScale;
      if(activeEffects.magnet>0&&ring.mesh.position.z>-650&&ring.mesh.position.z<70){
        ring.mesh.position.x+=(planePos.x-ring.mesh.position.x)*0.036;
        ring.mesh.position.y+=(planePos.y-ring.mesh.position.y)*0.036;
      }
      if(ring.mesh.position.z>180){ spawnRing(ring,false); continue; }
      var dx=planePos.x-ring.mesh.position.x;
      var dy=planePos.y-ring.mesh.position.y;
      var dz=planePos.z-ring.mesh.position.z;
      var distSq=dx*dx+dy*dy+dz*dz;
      var collectRadius=activeEffects.magnet>0?55:32;
      if(distSq<collectRadius*collectRadius){
        comboCount++; comboTimer=2.4;
        bestComboThisRun=Math.max(bestComboThisRun,comboCount);
        ringsCollectedThisRun++;
        var pts=10*scoreMultiplier;
        score+=pts;
        updateMissionProgress("rings",1);
        updateMissionProgress("combo",comboCount);
        if(bossEnemy) damageBoss(8+Math.floor(comboCount/4));
        // Score popup
        spawnScorePopup("+" +pts+(comboCount>=5?" ×"+comboCount:""),ring.mesh.position.x,ring.mesh.position.y,comboCount>=10?"combo":"");
        soundManager.playCollect(comboCount);
        unlockAchievement("firstRing");
        if(comboCount>=5) unlockAchievement("combo5");
        if(comboCount>=20) unlockAchievement("combo20");
        if(comboCount>=50) unlockAchievement("combo50");
        checkComboMilestones();
        spawnRing(ring,false);
      }
    }
  }

  // ═══════════════════════════════════════════
  // POWERUP UPDATE
  // ═══════════════════════════════════════════
  function activatePowerup(type){
    if(type==="shield") activeEffects.shield=Math.max(activeEffects.shield,getPowerDuration("shield"));
    if(type==="magnet") activeEffects.magnet=Math.max(activeEffects.magnet,getPowerDuration("magnet"));
    if(type==="slow") activeEffects.slow=Math.max(activeEffects.slow,getPowerDuration("slow"));
    if(type==="boost") activeEffects.boost=Math.max(activeEffects.boost,getPowerDuration("boost"));
    if(type==="score2x") activeEffects.score2x=Math.max(activeEffects.score2x,getPowerDuration("score2x"));
    if(type==="timeWarp") activeEffects.timeWarp=Math.max(activeEffects.timeWarp,getPowerDuration("timeWarp"));
    if(type==="starPower") activeEffects.starPower=Math.max(activeEffects.starPower,getPowerDuration("starPower"));
    if(type==="extraLife") lives=Math.min(maxLives,lives+1);
    powerupsThisRun++; stats.totalPowerups=(stats.totalPowerups||0)+1; updateMissionProgress("powerups",1);
    soundManager.playPowerup();
    spawnScorePopup(t(POWERUP_KEYS[type]).toUpperCase()+" ✦",airplane.mesh.position.x,airplane.mesh.position.y+30,type);
  }
  function updatePowerups(){
    var gameSpeed=getGameSpeed(); var planePos=airplane.mesh.position;
    var motionScale=getMotionScale();
    for(var i=0;i<powerups.length;i++){
      var powerup=powerups[i];
      powerup.mesh.position.z+=gameSpeed*10.5;
      powerup.mesh.rotation.y+=0.04*motionScale;
      powerup.mesh.rotation.x+=0.025*motionScale;
      if(powerup.shell) powerup.shell.rotation.z+=0.05*motionScale;
      if(powerup.mesh.position.z>180){ spawnPowerup(powerup,false); continue; }
      var dx=planePos.x-powerup.mesh.position.x;
      var dy=planePos.y-powerup.mesh.position.y;
      var dz=planePos.z-powerup.mesh.position.z;
      var distSq=dx*dx+dy*dy+dz*dz;
      if(distSq<42*42){ activatePowerup(powerup.type); spawnPowerup(powerup,false); }
    }
  }

  // ═══════════════════════════════════════════
  // OBSTACLE UPDATE
  // ═══════════════════════════════════════════
  function updateObstacles(){
    var gameSpeed=getGameSpeed(); var planePos=airplane.mesh.position;
    var now=gameNow(); var motionScale=getMotionScale();
    for(var i=0;i<obstacles.length;i++){
      var obstacle=obstacles[i];
      obstacle.mesh.position.z+=gameSpeed*12.5;
      obstacle.mesh.rotation.x+=(0.02+Math.sin(now*0.002+i)*0.015)*motionScale;
      obstacle.mesh.rotation.y+=(0.025+Math.cos(now*0.0025+i)*0.01)*motionScale;
      obstacle.mesh.rotation.z+=0.01*motionScale;
      obstacle.mesh.position.y+=Math.sin(now*0.004+i*0.7)*0.15*motionScale;
      if(obstacle.mesh.position.z>180){ spawnObstacle(obstacle,false); continue; }
      var dx=planePos.x-obstacle.mesh.position.x;
      var dy=planePos.y-obstacle.mesh.position.y;
      var dz=planePos.z-obstacle.mesh.position.z;
      var distSq=dx*dx+dy*dy+dz*dz;
      if(distSq<34*34&&hitTimer<=0){
        if(activeEffects.starPower>0){
          score+=25*scoreMultiplier; spawnScorePopup("+STAR",obstacle.mesh.position.x,obstacle.mesh.position.y,"boost"); spawnObstacle(obstacle,false); continue;
        }
        if(settings.immortalMode){ comboCount=0; comboTimer=0; hitTimer=0.45; soundManager.playObstacle(); spawnObstacle(obstacle,false); continue; }
        if(activeEffects.shield>0){
          activeEffects.shield=0; hitTimer=0.65;
          shieldFlashEl.style.opacity="1";
          setTimeout(function(){ shieldFlashEl.style.opacity="0"; },200);
          soundManager.playShieldBreak(); spawnObstacle(obstacle,false); continue;
        }
        lives--; comboCount=0; comboTimer=0; hitTimer=0.4;
        soundManager.playObstacle(); spawnObstacle(obstacle,false);
        maybeTriggerFinalLifeBulletTime();
        if(lives<=0){
          lives=0;
          if(score>=REVIVE_COST) showReviveScreen();
          else{ gameOver=true; showEndScreen(t("gameOverTitle"),t("gameOverText")); }
        }
      } else if(distSq<92*92&&distSq>42*42&&obstacle.mesh.position.z>-360&&obstacle.mesh.position.z<80){
        awardNearMiss(obstacle);
      }
    }
  }

  // ═══════════════════════════════════════════
  // FOREST UPDATE
  // ═══════════════════════════════════════════
  function updateForest(){
    if(!forest||!forest.trees) return;
    var tNow=gameNow();
    for(var i=0;i<forest.trees.length;i++){
      var tree=forest.trees[i];
      tree.canopy.rotation.x=Math.sin(tNow*tree.swaySpeed+tree.swayOffset)*0.1;
      tree.canopy.rotation.z=Math.cos(tNow*tree.swaySpeed+tree.swayOffset)*0.1;
      var globalAngle=(tree.angle+forest.mesh.rotation.z)%(Math.PI*2);
      if(globalAngle<0) globalAngle+=Math.PI*2;
      tree.snowCap.visible=(currentStage===1);
      var sinA=Math.sin(globalAngle);
      var scale=0.001;
      if(sinA>0.8) scale=tree.baseScale;
      else if(sinA>0.6) scale=tree.baseScale*((sinA-0.6)/0.2);
      tree.mesh.scale.set(scale,scale,scale);
    }
  }
